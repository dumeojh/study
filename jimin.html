<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>안성여고 통계 포스터 프로젝트 통합 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .step-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .step-card:hover {
            transform: translateY(-5px);
        }

        input,
        textarea,
        select {
            font-size: 16px !important;
        }
    </style>
</head>

<body class="min-h-screen text-slate-800 pb-10">

    <div id="app" class="max-w-4xl mx-auto px-4 py-6">
        <header class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-black text-slate-900 mb-2">📊 통계 포스터 제작 프로젝트</h1>
            <p class="text-slate-500 text-sm font-medium">안성여고 교육과정 연계 탐구 활동</p>
        </header>

        <section id="login-section" class="max-w-md mx-auto glass-card p-8 rounded-[2rem] shadow-2xl">
            <h2 class="text-xl font-bold mb-6 text-center text-slate-700">학생 본인 확인</h2>
            <div class="space-y-4">
                <input type="text" id="student-id"
                    class="w-full p-4 border rounded-2xl bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none"
                    placeholder="학번 5자리 (예: 10101)">
                <input type="text" id="student-name"
                    class="w-full p-4 border rounded-2xl bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none"
                    placeholder="이름을 입력하세요">
                <button onclick="handleLogin()"
                    class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black hover:bg-indigo-700 shadow-lg transition">입장하기</button>
            </div>
            <div class="mt-8 text-center">
                <button onclick="showAdminAuth()"
                    class="text-xs text-slate-400 hover:text-slate-600 font-bold flex items-center justify-center gap-1 mx-auto">
                    ⚙️ 환경설정
                </button>
            </div>
        </section>

        <section id="dashboard-section" class="hidden space-y-6">
            <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border">
                <div class="font-bold text-slate-700"><span id="user-display"></span>님, 환영합니다!</div>
                <button onclick="handleLogout()" class="text-xs text-red-500 font-bold">로그아웃</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div onclick="openModal('step1')"
                    class="step-card glass-card p-6 rounded-3xl border-l-8 border-blue-500 cursor-pointer shadow-md">
                    <span class="text-[10px] font-black text-blue-600 uppercase">Step 01</span>
                    <h3 class="text-lg font-bold mt-1">주제 및 탐구 문제 설정</h3>
                </div>
            </div>
        </section>

        <section id="admin-section" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black">⚙️ 환경설정</h2>
                <button onclick="closeAdmin()" class="px-4 py-2 bg-slate-200 rounded-xl font-bold text-xs">돌아가기</button>
            </div>

            <div class="bg-white p-6 rounded-3xl border shadow-sm space-y-6">
                <div class="grid grid-cols-2 gap-3">
                    <label
                        class="flex flex-col items-center justify-center p-4 bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-2xl cursor-pointer hover:bg-indigo-100 transition">
                        <span class="text-sm font-bold text-indigo-600">📥 엑셀 불러오기</span>
                        <input type="file" id="excel-upload" class="hidden" accept=".xlsx, .xls, .csv"
                            onchange="importExcel(event)">
                    </label>
                    <button onclick="exportExcel()"
                        class="flex flex-col items-center justify-center p-4 bg-emerald-50 border-2 border-emerald-200 rounded-2xl hover:bg-emerald-100 transition">
                        <span class="text-sm font-bold text-emerald-600">📤 엑셀 저장하기</span>
                    </button>
                </div>

                <div>
                    <h3 class="font-bold mb-2">직접 입력 또는 수정</h3>
                    <textarea id="admin-student-list"
                        class="w-full h-40 p-4 bg-slate-50 border rounded-2xl font-mono text-sm mb-4"
                        placeholder="학번 이름 (예: 10101 홍길동)"></textarea>
                    <button onclick="saveStudentList()"
                        class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold">명단 업데이트</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        let state = {
            currentUser: null,
            students: JSON.parse(localStorage.getItem('as_stat_students')) || [],
            adminPw: "jimin2026"
        };

        // --- 로그인 및 로그아웃 ---
        function handleLogin() {
            const id = document.getElementById('student-id').value.trim();
            const name = document.getElementById('student-name').value.trim();

            // 학번과 이름이 모두 일치해야 입장 가능 (오류 방지)
            const student = state.students.find(s => s.id === id && s.name === name);

            if (student) {
                state.currentUser = student;
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
                document.getElementById('user-display').textContent = `${student.id} ${student.name}`;
            } else {
                alert("등록된 학생 정보가 없습니다. 학번과 이름을 다시 확인해 주세요.");
            }
        }

        function handleLogout() {
            location.reload();
        }

        // --- 환경설정 관리 ---
        function showAdminAuth() {
            const pw = prompt("관리자 비밀번호를 입력하세요.");
            if (pw === state.adminPw) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-section').classList.remove('hidden');
                updateTextArea();
            }
        }

        function closeAdmin() {
            document.getElementById('admin-section').classList.add('hidden');
            document.getElementById('login-section').classList.remove('hidden');
        }

        function updateTextArea() {
            document.getElementById('admin-student-list').value = state.students.map(s => `${s.id}\t${s.name}`).join('\n');
        }

        function saveStudentList() {
            const raw = document.getElementById('admin-student-list').value.trim();
            state.students = raw.split('\n').map(line => {
                const parts = line.split(/[\t, ]+/).filter(p => p.trim());
                return parts.length >= 2 ? { id: parts[0], name: parts[1] } : null;
            }).filter(s => s);
            localStorage.setItem('as_stat_students', JSON.stringify(state.students));
            alert("명단이 성공적으로 저장되었습니다.");
        }

        // --- 엑셀 불러오기 기능 ---
        function importExcel(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];

                // 엑셀 데이터를 JSON 형식으로 변환 (첫 번째 열: 학번, 두 번째 열: 이름 가정)
                const json = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                const newStudents = json.map(row => {
                    if (row.length >= 2) {
                        return { id: String(row[0]).trim(), name: String(row[1]).trim() };
                    }
                    return null;
                }).filter(s => s && s.id !== 'undefined');

                if (newStudents.length > 0) {
                    state.students = newStudents;
                    localStorage.setItem('as_stat_students', JSON.stringify(state.students));
                    updateTextArea();
                    alert(`${newStudents.length}명의 명단을 불러왔습니다. '명단 업데이트'를 눌러 확정해 주세요.`);
                } else {
                    alert("엑셀 파일에서 유효한 명단을 찾을 수 없습니다.");
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // --- 엑셀 저장하기(내보내기) 기능 ---
        function exportExcel() {
            if (state.students.length === 0) {
                alert("내보낼 명단이 없습니다.");
                return;
            }

            const excelData = state.students.map(s => [s.id, s.name]);
            // 헤더 추가
            excelData.unshift(["학번", "이름"]);

            const worksheet = XLSX.utils.aoa_to_sheet(excelData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "학생명단");

            // 파일 다운로드
            XLSX.writeFile(workbook, "안성여고_통계프로젝트_명단.xlsx");
        }

        function openModal(stepId) {
            alert(stepId + " 활동지를 엽니다.");
        }
    </script>
</body>

</html>
