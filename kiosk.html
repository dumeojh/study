<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>안성여고 통합 출결 키오스크</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 👇 새로 만든 공통 자바스크립트 파일을 연결합니다 👇 -->
    <script src="common.js"></script>


    <style>
        :root {
            --in: #0d6efd;
            --out: #ffc107;
            --return: #198754;
            --home: #dc3545;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .kiosk-box {
            background: white;
            width: 90%;
            max-width: 650px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            position: relative;
        }

        .school-title {
            font-size: 24px;
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
        }

        .clock {
            font-size: 55px;
            font-weight: 900;
            color: #222;
            margin-bottom: 5px;
            font-family: monospace;
        }

        .date {
            font-size: 18px;
            color: #888;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .status-btn {
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
            border: 3px solid transparent;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.2s;
            background: white;
        }

        .btn-in {
            color: var(--in);
            border-color: #b6d4fe;
        }

        .btn-in.selected {
            background: var(--in);
            color: white;
            border-color: var(--in);
        }

        .btn-out {
            color: #b38200;
            border-color: #fff3cd;
        }

        .btn-out.selected {
            background: var(--out);
            color: black;
            border-color: var(--out);
        }

        .btn-return {
            color: var(--return);
            border-color: #badbcc;
        }

        .btn-return.selected {
            background: var(--return);
            color: white;
            border-color: var(--return);
        }

        .btn-home {
            color: var(--home);
            border-color: #f5c2c7;
        }

        .btn-home.selected {
            background: var(--home);
            color: white;
            border-color: var(--home);
        }

        .input-area {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #e9ecef;
        }

        .guide-text {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        #scanner-input {
            width: 100%;
            max-width: 250px;
            padding: 15px;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            border: 3px solid #ccc;
            border-radius: 10px;
            letter-spacing: 3px;
        }

        #scanner-input:focus {
            outline: none;
            border-color: #444;
        }

        #result-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .receipt {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            border: 2px dashed #ccc;
            width: 80%;
        }

        .r-name {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .r-status {
            font-size: 35px;
            font-weight: 900;
            margin-bottom: 15px;
        }

        .r-time {
            font-size: 18px;
            color: #666;
            margin-bottom: 15px;
        }

        .r-msg {
            font-size: 16px;
            font-weight: bold;
            background: #eee;
            padding: 10px;
            border-radius: 8px;
        }

        @keyframes urgentBlink {

            0%,
            100% {
                background-color: white;
                border-color: #dc3545;
            }

            50% {
                background-color: #ffe6e6;
                border-color: #dc3545;
                transform: scale(1.05);
                box-shadow: 0 0 30px rgba(220, 53, 69, 0.5);
            }
        }

        .receipt.blink-warning {
            animation: urgentBlink 0.4s infinite;
            border-width: 5px;
            border-style: solid;
        }
    </style>
</head>

<body>

    <div class="kiosk-box">
        <div class="school-title">🏫 안성여고 자율학습 출결 센터</div>
        <div class="clock" id="live-clock">00:00:00</div>
        <div class="date" id="live-date">2026년 00월 00일</div>

        <div style="width: 100%; text-align: right; margin-bottom: 8px;">
            <span onclick="toggleStatusGrid()"
                style="cursor: pointer; color: #adb5bd; font-size: 13px; font-weight: bold; border-bottom: 1px dashed #adb5bd; transition: 0.2s;"
                onmouseover="this.style.color='#495057'" onmouseout="this.style.color='#adb5bd'">
                ▼ 수동 상태 버튼 펼치기
            </span>
        </div>

        <div class="status-grid" id="status-grid-area" style="display: none;">
            <button class="status-btn btn-in selected" onclick="selectStatus('입실', this)">🟢 등교 입실</button>
            <button class="status-btn btn-out" onclick="selectStatus('외출', this)">🟡 잠시 외출</button>
            <button class="status-btn btn-return" onclick="selectStatus('복귀', this)">🔵 외출 복귀</button>
            <button class="status-btn btn-home" onclick="selectStatus('귀가', this)">🔴 최종 귀가</button>
        </div>

        <div class="input-area">
            <div class="guide-text" id="guide-msg">학생증을 스캔하거나 학번을 입력하세요.</div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <input type="text" id="scanner-input" placeholder="학생증 스캔 또는 학번" autocomplete="off"
                    style="text-transform: uppercase;">
                <input type="text" id="name-input" placeholder="이름" autocomplete="off"
                    style="display:none; width: 100%; max-width: 150px; padding: 15px; font-size: 24px; font-weight: bold; text-align: center; border: 3px solid #ccc; border-radius: 10px;">
            </div>
        </div>

        <div id="result-overlay">
            <div class="receipt">
                <div class="r-name" id="r-name">-</div>
                <div class="r-status" id="r-status">-</div>
                <div class="r-time" id="r-time">-</div>
                <div class="r-msg" id="r-msg">-</div>
            </div>
        </div>
    </div>

    <script>

        let serverRoster = {};


        let serverBarcodes = {};
        let currentStatus = "입실";
        const todayObj = new Date();
        // 🌟 리팩토링: 길게 쓰던 날짜 변환 코드를 공통 함수로 교체!
        const todayStr = getTodayString();



        let isProcessing = false;
        let selectionTimer = null;
        let currentStudentLogData = null;
        let receiptTimeout = null; // 🌟 추가: 영수증 화면 대기 타이머

        // ★ 스캐너 속도 측정을 위한 변수
        let firstCharTime = 0;

        // 🌟 추가: 환경설정에서 가져올 인증 모드와 야자 최종 종료 시간
        let authMode = "1";
        let finalEndTime = "21:30";

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('ko-KR', { hour12: false });
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            document.getElementById('live-date').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 (${days[now.getDay()]}요일)`;
        }
        setInterval(updateClock, 1000); updateClock();

        async function fetchRoster() {
            const { data, error } = await supabaseClient.from('settings').select('value').eq('key', 'roster').maybeSingle();
            if (data && data.value) {
                serverRoster = JSON.parse(data.value.list || "{}");
                serverBarcodes = JSON.parse(data.value.barcodeList || "{}");
            }
        }
        fetchRoster();

        function selectStatus(status, btnElement) {
            currentStatus = status;
            document.querySelectorAll('.status-btn').forEach(btn => btn.classList.remove('selected'));
            btnElement.classList.add('selected');
            const guide = document.getElementById('guide-msg');
            if (status === '귀가') guide.innerHTML = "<span style='color:red;'>귀가 처리 후에는 다시 입실할 수 없습니다.</span><br>학생증을 스캔하세요.";
            else guide.innerText = "학생증을 스캔하거나 학번을 입력하세요.";
            focusScanner();
        }

        const scannerInput = document.getElementById('scanner-input');
        const nameInput = document.getElementById('name-input');
        function focusScanner() {
            if (!isProcessing) scannerInput.focus();
        }
        document.addEventListener('click', focusScanner);
        setInterval(() => {
            if (!isProcessing && document.activeElement !== scannerInput && document.activeElement !== nameInput) focusScanner();
        }, 2000);

        async function fetchSettings() {
            const { data, error } = await supabaseClient.from('settings').select('value').eq('key', 'schedule').maybeSingle();
            if (data && data.value) {
                if (data.value.authMode) {
                    authMode = data.value.authMode;
                    if (authMode === "3") nameInput.style.display = 'block';
                }
                // 🌟 추가: 환경설정에서 3T 종료 시간 가져오기
                if (data.value.t3_end) {
                    finalEndTime = data.value.t3_end;
                }
            }
        }
        fetchSettings();

        // 키오스크가 켜져 있는 동안 1시간마다 명단과 설정을 자동으로 새로 고침
        setInterval(() => {
            console.log("실시간 데이터(명단/설정) 동기화 중...");
            fetchRoster();
            fetchSettings();
        }, 60 * 60 * 1000);

        scannerInput.addEventListener('input', function (e) {
            if (scannerInput.value.length === 1) {
                firstCharTime = Date.now();
            }
        });


        scannerInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();

                // 1. 일반 '처리 완료(파란색/빨간색 등)' 영수증 화면일 때는 뒷사람 스캔 시 즉시 넘겨줌 (유지)
                if (receiptTimeout) {
                    clearTimeout(receiptTimeout);
                    receiptTimeout = null;
                    document.getElementById('result-overlay').style.display = 'none';
                    document.querySelector('.kiosk-box').style.backgroundColor = "#ffffff";
                }

                // 2. 🌟 앞사람이 '상태 선택(외출/귀가)' 중일 때는 뒷사람 스캔 완전 무시!
                if (selectionTimer != null) {
                    scannerInput.value = ""; // 뒷사람이 찍은 바코드 번호가 입력창에 꼬이지 않게 즉시 지워버림
                    return; // 아무 처리도 하지 않고 여기서 차단!
                }

                // DB 통신 중일 때도 찌꺼기가 남지 않도록 입력창 비우고 차단
                if (isProcessing) {
                    scannerInput.value = "";
                    return;
                }

                let typeSpeed = Date.now() - firstCharTime;
                let isScanner = (typeSpeed < 200);

                if (authMode === "3" && scannerInput.value.trim() !== "") nameInput.focus();
                else processCheckInOut(isScanner);
            }
        });


        nameInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (isProcessing) return;
                processCheckInOut(false);
            }
        });

        function convertKorToEng(text) {
            const cho = ["r", "R", "s", "e", "E", "f", "a", "q", "Q", "t", "T", "d", "w", "W", "c", "z", "x", "v", "g"];
            const jung = ["k", "o", "i", "O", "j", "p", "u", "P", "h", "hk", "ho", "hl", "y", "n", "nj", "np", "nl", "b", "m", "ml", "l"];
            const jong = ["", "r", "R", "rt", "s", "sw", "sg", "e", "f", "fr", "fa", "fq", "ft", "fx", "fv", "fg", "a", "q", "qt", "t", "T", "d", "w", "c", "z", "x", "v", "g"];
            const jamoMap = { 'ㄱ': 'r', 'ㄲ': 'R', 'ㄳ': 'rt', 'ㄴ': 's', 'ㄵ': 'sw', 'ㄶ': 'sg', 'ㄷ': 'e', 'ㄸ': 'E', 'ㄹ': 'f', 'ㄺ': 'fr', 'ㄻ': 'fa', 'ㄼ': 'fq', 'ㄽ': 'ft', 'ㄾ': 'fx', 'ㄿ': 'fv', 'ㅀ': 'fg', 'ㅁ': 'a', 'ㅂ': 'q', 'ㅃ': 'Q', 'ㅄ': 'qt', 'ㅅ': 't', 'ㅆ': 'T', 'ㅇ': 'd', 'ㅈ': 'w', 'ㅉ': 'W', 'ㅊ': 'c', 'ㅋ': 'z', 'ㅌ': 'x', 'ㅍ': 'v', 'ㅎ': 'g', 'ㅏ': 'k', 'ㅐ': 'o', 'ㅑ': 'i', 'ㅒ': 'O', 'ㅓ': 'j', 'ㅔ': 'p', 'ㅕ': 'u', 'ㅖ': 'P', 'ㅗ': 'h', 'ㅘ': 'hk', 'ㅙ': 'ho', 'ㅚ': 'hl', 'ㅛ': 'y', 'ㅜ': 'n', 'ㅝ': 'nj', 'ㅞ': 'np', 'ㅟ': 'nl', 'ㅠ': 'b', 'ㅡ': 'm', 'ㅢ': 'ml', 'ㅣ': 'l' };
            let result = "";
            for (let i = 0; i < text.length; i++) {
                let code = text.charCodeAt(i);
                if (code >= 44032 && code <= 55203) { code -= 44032; result += cho[Math.floor(code / (21 * 28))] + jung[Math.floor((code % (21 * 28)) / 28)] + jong[(code % (21 * 28)) % 28]; }
                else if (code >= 12593 && code <= 12643) { result += jamoMap[text[i]] || text[i]; }
                else { result += text[i]; }
            }
            return result;
        }


        // 수동 상태 버튼 접기/펼치기 함수
        function toggleStatusGrid() {
            const grid = document.getElementById('status-grid-area');
            const btn = event.target;

            if (grid.style.display === 'none') {
                grid.style.display = 'grid';
                btn.innerText = '▲ 수동 상태 버튼 접기';
            } else {
                grid.style.display = 'none';
                btn.innerText = '▼ 수동 상태 버튼 펼치기';
            }

            // 버튼을 누른 후 키오스크가 멈추지 않도록 다시 바코드 입력창으로 포커스
            focusScanner();
        }


        async function processCheckInOut(isScanner) {
            let rawId = scannerInput.value.trim();
            if (!rawId) return;

            // 🌟 추가: 바코드를 읽자마자 입력창을 비워 다음 학생 스캔과 섞이지 않게 함
            scannerInput.value = "";

            isProcessing = true;

            let id = convertKorToEng(rawId).toUpperCase();
            const nameVal = nameInput.value.trim();

            if (serverBarcodes[id]) {
                id = serverBarcodes[id];
                isScanner = true;
            }

            const studentName = serverRoster[id];
            if (!studentName) {
                showReceipt("오류", `[${id}]`, "등록되지 않은 학번/바코드입니다.", "명단을 확인해 주세요.", "#dc3545");
                return;
            }

            if (authMode === "3") {
                if (!nameVal) { nameInput.focus(); isProcessing = false; return; }
                if (studentName !== nameVal) {
                    showReceipt("오류", "이름 불일치", `학번 [${id}]의 이름이 틀립니다.`, "다시 입력해주세요.", "#dc3545");
                    focusScanner(); return;
                }
                executeLogic(id, studentName);
            } else if (authMode === "2" && !isScanner) {
                showNameConfirm(id, studentName);
            } else {
                executeLogic(id, studentName);
            }
        }

        function showNameConfirm(id, name) {
            document.getElementById('r-name').innerText = `🙋 ${name} 학생`;
            document.getElementById('r-status').innerText = "본인 확인";
            document.getElementById('r-status').style.color = "#0d6efd";
            document.getElementById('r-time').innerText = "화면의 이름이 본인이 맞습니까?";
            document.getElementById('r-msg').innerHTML = `
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="confirmYes('${id}', '${name}')" style="flex: 1; padding: 25px; font-size: 20px; font-weight: bold; background: #0d6efd; color: white; border: none; border-radius: 10px; cursor: pointer;">예 (맞습니다)</button>
                <button onclick="confirmNo()" style="flex: 1; padding: 25px; font-size: 20px; font-weight: bold; background: #6c757d; color: white; border: none; border-radius: 10px; cursor: pointer;">아니오</button>
            </div>`;
            document.getElementById('result-overlay').style.display = 'flex';
            document.querySelector('.receipt').classList.remove('blink-warning');
        }

        function confirmYes(id, name) {
            document.getElementById('r-msg').innerHTML = `<div style="margin-top: 20px; padding: 20px; font-size: 20px; font-weight: bold; color: #0d6efd; background: #f0f9ff; border-radius: 10px;">⏳ 출결 데이터를 확인 중입니다...</div>`;
            executeLogic(id, name);
        }

        function confirmNo() {
            document.getElementById('result-overlay').style.display = 'none';
            scannerInput.value = "";
            isProcessing = false;
            focusScanner();
        }


        ///////////////////////////////////////////////////////////////
        async function executeLogic(id, studentName) {
            scannerInput.value = ""; nameInput.value = "";
            const now = new Date();
            // 👇👇 [추가할 부분] 바코드가 인식된 '바로 지금 이 순간'의 오늘 날짜를 구합니다. 👇👇
            const realTodayStr = now.toLocaleDateString('en-CA', { timeZone: 'Asia/Seoul' });


            const currentMonthStr = (now.getMonth() + 1) + "월";
            const todayDayEng = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'][now.getDay()];

            try {
                const { data: appDataList, error: appError } = await supabaseClient
                    .from('applications')
                    .select('*')
                    .eq('stu_id', id)
                    .eq('target_month', currentMonthStr);

                if (appError || !appDataList || appDataList.length === 0) {
                    showReceipt(studentName, "입실 불가", "신청 내역 없음", `이번 달(${currentMonthStr}) 야자 신청자가 아닙니다.`, "#dc3545");
                    return;
                }

                // 👇 요일 제한 로직 삭제 (미신청 요일에도 입실 허용) 👇
                /*
                if (!appData[todayDayEng]) {
                    showReceipt(studentName, "입실 불가", "오늘 신청 아님", "오늘은 야자를 신청한 요일이 아닙니다.", "#dc3545");
                    return;
                }
                */
                // 👆 ------------------------------------------------ 👆
                const appData = appDataList[0]; // 🚨 이 한 줄을 반드시 추가해 주세요!

                if (appData.type === "자율석") {
                    const { data: ticketData, error: ticketError } = await supabaseClient
                        .from('daily_reservations')
                        .select('seat_num')
                        .eq('date', realTodayStr) // <--- 여기 수정
                        .eq('stu_id', id)
                        .maybeSingle();

                    if (!ticketData || !ticketData.seat_num) {
                        showReceipt(studentName, "입실 불가", "자리 미발권", "자율석 발권기에서 먼저 자리를 선택해주세요! 🎟️", "#dc3545");
                        return;
                    }
                }

                const logId = `${realTodayStr}_${id}`; // <--- 여기 수정 (DB 고유 ID 생성)

                const { data: logData, error: logError } = await supabaseClient
                    .from('attendance_logs')
                    .select('*')
                    .eq('id', logId)
                    .maybeSingle();

                const lastStatus = logData ? logData.status : "미입실";

                if (logData && logData.last_update_time) {
                    const lastUpdateTime = new Date(logData.last_update_time);
                    const diffSec = Math.floor((now - lastUpdateTime) / 1000);
                    if (diffSec < 20) {
                        showReceipt(studentName, "방금 처리됨", `${diffSec}초 전에 [${lastStatus}] 처리되었습니다.`, "잠시 후 다시 스캔해 주세요.", "#6c757d");
                        return;
                    }
                }

                currentStudentLogData = logData;

                // 🌟 3T 종료 시간(최종 마감 시간) 이후에는 무조건 귀가 처리하는 로직 추가
                const currentMin = now.getHours() * 60 + now.getMinutes();
                const [endH, endM] = finalEndTime.split(':').map(Number);
                const finalEndMin = endH * 60 + endM;

                if (lastStatus === "미입실") saveAttendance(id, studentName, "입실", now);
                else if (lastStatus === "입실" || lastStatus === "복귀") {
                    if (currentMin >= finalEndMin) {
                        // 야자 종료 시간 이후라면 바로 귀가 처리
                        saveAttendance(id, studentName, "귀가", now);
                    } else {
                        // 그 전이라면 기존처럼 외출/귀가 선택 팝업 띄우기
                        showSmartSelection(id, studentName);
                    }
                }
                else if (lastStatus === "외출") saveAttendance(id, studentName, "복귀", now);
                else if (lastStatus === "귀가" || lastStatus === "귀가(누락)") showReceipt(studentName, "이미 귀가함", "최종 귀가 처리된 학생입니다.", "관리자에게 문의하세요.", "#6c757d");

            } catch (e) { showReceipt("오류", "통신 실패", "연결 상태 확인 요망", e.message, "#dc3545"); }
        }




        function showSmartSelection(id, name) {
            document.getElementById('r-name').innerText = `🙋 ${name} 학생`;
            document.getElementById('r-status').innerText = "상태 선택";
            document.getElementById('r-status').style.color = "#333";
            document.getElementById('r-time').innerText = "현재 입실 중입니다. 다음 작업을 선택하세요.";
            document.getElementById('r-msg').innerHTML = `
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="confirmSelection('${id}', '${name}', '외출')" style="flex: 1; padding: 25px; font-size: 20px; font-weight: bold; background: var(--out); border: none; border-radius: 10px; cursor: pointer;">잠시 외출</button>
                <button onclick="confirmSelection('${id}', '${name}', '귀가')" style="flex: 1; padding: 25px; font-size: 20px; font-weight: bold; background: var(--home); color: white; border: none; border-radius: 10px; cursor: pointer;">최종 귀가</button>
            </div>
            <div id="cancel-timer" style="margin-top: 15px; color: #dc3545; font-weight: bold;">(10초 뒤 자동 취소됩니다)</div>
        `;
            document.getElementById('result-overlay').style.display = 'flex';

            let timeLeft = 10;
            if (selectionTimer) clearInterval(selectionTimer);
            selectionTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('cancel-timer').innerText = `(${timeLeft}초 뒤 자동 취소됩니다)`;
                if (timeLeft <= 0) {
                    clearInterval(selectionTimer);
                    selectionTimer = null; // 👈 이 줄을 반드시 추가해 주세요!
                    document.getElementById('result-overlay').style.display = 'none';
                    isProcessing = false;
                    focusScanner();
                }
            }, 1000);
        }

        function confirmSelection(id, name, status) {
            if (selectionTimer) {
                clearInterval(selectionTimer);
                selectionTimer = null; // 👈 이 줄을 반드시 추가해 주세요!
            }
            saveAttendance(id, name, status, new Date());
        }


        // ✅ 이렇게 변경해 주세요 (수정 완료 코드)
        async function saveAttendance(id, name, status, timeObj) {
            // 1️⃣ 넘어온 시간(timeObj)을 기준으로 정확한 오늘 날짜를 다시 계산합니다.
            const realTodayStr = timeObj.toLocaleDateString('en-CA', { timeZone: 'Asia/Seoul' });

            // 2️⃣ 계산된 실시간 날짜로 고유 ID를 만듭니다.
            const logId = `${realTodayStr}_${id}`;
            const timeStr = timeObj.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit' });

            try {
                const { data: currentData } = await supabaseClient
                    .from('attendance_logs')
                    .select('history')
                    .eq('id', logId)
                    .maybeSingle();

                let newHistory = (currentData && currentData.history) ? currentData.history : [];
                newHistory.push(`${status} (${timeStr})`);

                const { error } = await supabaseClient
                    .from('attendance_logs')
                    .upsert({
                        id: logId,
                        date: realTodayStr, // 3️⃣ DB에 저장되는 기준 날짜도 실시간 날짜로 변경합니다.
                        stu_id: id,
                        stu_name: name,
                        status: status,
                        last_update_time: timeObj.toISOString(),
                        history: newHistory
                    });

                if (error) throw error;

                let color = status === "입실" ? "#0d6efd" : (status === "복귀" ? "#198754" : (status === "외출" ? "#b38200" : "#dc3545"));

                // 🌟 3T 종료 후 자동 귀가 처리된 경우 메시지 추가
                let successMsg = "정상 처리되었습니다.";
                if (status === "귀가" && timeObj.getHours() * 60 + timeObj.getMinutes() >= parseInt(finalEndTime.split(':')[0]) * 60 + parseInt(finalEndTime.split(':')[1])) {
                    successMsg = "야자 종료 시간 경과로 <b>자동 귀가 처리</b> 되었습니다.";
                }

                showReceipt(name, status + " 완료", `처리시간: ${timeStr}`, successMsg, color);

            } catch (e) {
                showReceipt("오류", "저장 실패", "연결 오류", e.message || "알 수 없는 오류가 발생했습니다.", "#dc3545");
            }
        }




        function showReceipt(name, status, timeInfo, msg, color, isUrgent = false) {
            const container = document.querySelector('.kiosk-box');
            const originalBg = "#ffffff";
            if (status.includes("귀가")) container.style.backgroundColor = "#fff5f5";
            else if (status.includes("입실") || status.includes("복귀")) container.style.backgroundColor = "#f0f9ff";

            const receiptBox = document.querySelector('.receipt');
            if (isUrgent) receiptBox.classList.add('blink-warning');
            else receiptBox.classList.remove('blink-warning');

            document.getElementById('r-name').innerText = name;
            document.getElementById('r-status').innerText = status;
            document.getElementById('r-status').style.color = color;
            document.getElementById('r-time').innerText = timeInfo;
            document.getElementById('r-msg').innerHTML = msg;

            const overlay = document.getElementById('result-overlay');
            overlay.style.display = 'flex';

            // 🌟 핵심 수정: DB 저장이 끝났으므로 화면이 떠 있어도 잠금을 해제합니다!
            isProcessing = false;

            // 기존 타이머가 돌고 있다면 취소
            if (receiptTimeout) clearTimeout(receiptTimeout);

            // 2.5초 뒤 화면 닫기 예약
            receiptTimeout = setTimeout(() => {
                overlay.style.display = 'none';
                container.style.backgroundColor = originalBg;
                selectStatus('입실', document.querySelector('.btn-in'));
                receiptTimeout = null;
                focusScanner();
            }, 2500);
        }




        async function autoSweepPastAttendance() {
            try {
                const { data: schedDoc } = await supabaseClient.from('settings').select('value').eq('key', 'schedule').maybeSingle();
                if (schedDoc && schedDoc.value && schedDoc.value.autoClose === false) return;

                const todayStr = getTodayString();



                const { data: pastLogs, error: fetchError } = await supabaseClient
                    .from('attendance_logs')
                    .select('*')
                    .lt('date', todayStr)
                    .neq('status', '귀가')         // 🌟 확실하게 '귀가' 제외
                    .neq('status', '귀가(누락)');   // 🌟 확실하게 '귀가(누락)' 제외




                if (fetchError) throw fetchError;

                if (pastLogs && pastLogs.length > 0) {
                    console.log(`🚨 과거 미마감 데이터 ${pastLogs.length}건 발견. 자동 마감을 진행합니다.`);

                    for (let log of pastLogs) {
                        let newHistory = log.history || [];
                        newHistory.push(`시스템 자동 마감 (태그 누락)`);

                        await supabaseClient.from("attendance_logs").update({
                            status: "귀가(누락)",
                            last_update_time: new Date().toISOString(),
                            history: newHistory
                        }).eq("id", log.id);
                    }
                    console.log("✅ 과거 데이터 자동 마감 완료");
                }
            } catch (e) {
                console.error("과거 데이터 자동 마감 중 오류:", e);
            }
        }

        autoSweepPastAttendance();
        setInterval(autoSweepPastAttendance, 60 * 60 * 1000);

    </script>
