<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안성여고 - 야간 자율학습 월간 통계</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --warning: #ffc107; --danger: #dc3545; --gray: #6c757d; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        .header-area { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; }
        h2 { margin: 0; color: #1a1a1a; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; text-decoration: none; display: inline-block; }
        .btn-gray { background: var(--gray); }
        .btn-primary { background: var(--primary); }
        
        .controls { display: flex; gap: 15px; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ddd; }
        .controls input[type="month"] { padding: 8px 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; font-weight: bold; }
        
        /* 달력 CSS */
        .stat-calendar { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .stat-calendar th { background: #e9ecef; padding: 12px; border: 1px solid #dee2e6; font-size: 14px; color: #495057; }
        .stat-calendar td { border: 1px solid #dee2e6; height: 130px; vertical-align: top; padding: 8px; transition: 0.2s; background: white; }
        .stat-calendar td:hover { background: #f8f9fa; }
        
        .date-num { font-weight: bold; font-size: 16px; margin-bottom: 8px; display: inline-block; }
        .sunday { color: #dc3545; }
        .saturday { color: #0d6efd; }
        
        /* 일일 현황 요약 박스 디자인 */
        .stat-box { font-size: 11px; line-height: 1.4; display: flex; flex-direction: column; gap: 4px; }
        .box-apply { background: #eef6ff; border: 1px solid #b6d4fe; border-radius: 5px; padding: 4px; color: #052c65; }
        .box-current { background: #fff3cd; border: 1px solid #ffe69c; border-radius: 5px; padding: 4px; color: #664d03; font-weight: bold; }
        .box-result { background: #d1e7dd; border: 1px solid #a3cfbb; border-radius: 5px; padding: 4px; color: #0a3622; font-weight: bold; }
        .box-holiday { background: #f8d7da; border: 1px dashed #f5c2c7; border-radius: 5px; padding: 10px; text-align: center; color: #842029; font-weight: bold; margin-top: 10px; }
        
        /* 로딩 스피너 */
        #loading { display: none; text-align: center; padding: 50px; font-size: 18px; font-weight: bold; color: var(--primary); }

        .apply-times {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-top: 4px;
            font-weight: bold;
            color: #0d6efd;
            padding: 0 2px;
        }

        .time-slot b {
            color: #333;
        }

        /* --- 신청 현황 그리드 디자인 --- */
        .apply-grid {
            display: grid;
            grid-template-columns: 26px 1fr 1fr 1fr 1fr;
            gap: 3px;
            margin-bottom: 5px;
            align-items: center;
        }
        .grid-title {
            font-size: 10px;
            font-weight: bold;
            color: #495057;
            text-align: left;
            letter-spacing: -0.5px;
        }
        .grid-item {
            text-align: center;
            border-radius: 4px;
            padding: 2px 0;
            font-size: 10px;
        }
        .grid-item.header {
            background: #6c757d;
            color: #ffffff;
            border: 1px solid #5c636a !important;
            font-weight: bold;
        }
        .grid-item.val {
            background: #ffffff;
            color: #111;
            font-weight: bold;
            font-size: 11px;
            border: 1px dashed #adb5bd;
        }
        .grid-item.status-val {
            background: #ffffff;
            color: #198754;
            font-weight: bold;
            font-size: 11px;
            border: 1px dashed #adb5bd;
        }
        .grid-item.status-error {
            background: #f8d7da;
            color: #dc3545;
            border: 1px dashed #dc3545;
            font-weight: bold;
            font-size: 11px;
        }
        .today-cell {
            border: 2px solid #0d6efd !important;
            background-color: #f4f8ff !important;
            box-shadow: inset 0 0 8px rgba(13, 110, 253, 0.1);
            position: relative;
            z-index: 1;
        }

        /* --- 탭 메뉴 및 표 디자인 --- */
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; background: #e9ecef; color: #495057; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3); }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .stat-class-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .stat-class-table th { background: #f8f9fa; padding: 12px; border: 1px solid #dee2e6; font-size: 15px; color: #495057; }
        .stat-class-table td { border: 1px solid #dee2e6; padding: 12px; text-align: center; font-size: 15px; background: white; }
        .stat-class-table tbody tr:hover { background-color: #f1f8ff; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h2>📊 자율학습 월간 통계 현황</h2>
        <div>
            <a href="split_admin.html" class="btn btn-gray">⬅️ 관리자 메인으로</a>
        </div>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('tab-calendar', this)">📅 달력 현황</button>
        <button class="tab-btn" onclick="switchTab('tab-class', this)">🏫 반별 통계 현황</button>
        <button class="tab-btn" onclick="switchTab('tab-personal', this)">👤 개인별 통계 현황</button>
    </div>

    <div class="controls">
        <b style="font-size: 16px;">조회할 연도 및 월:</b>
        <input type="month" id="month-picker" onchange="fetchDataAndRender()">
        <button class="btn btn-primary" onclick="fetchDataAndRender()">🔄 데이터 새로고침</button>
        <span style="margin-left:auto; font-size:13px; color:#666;">※ 과거 데이터나 미래의 신청 내역을 조회할 수 있습니다.</span>
    </div>

    <div id="loading">데이터를 분석 중입니다... ⏳</div>
    
    <div id="tab-calendar" class="tab-content active">
        <div id="calendar-container"></div>
    </div>

    <div id="tab-class" class="tab-content">
        <table class="stat-class-table">
            <thead>
                <tr>
                    <th>학급 (반)</th>
                    <th>신청 인원 (명)</th>
                    <th>월간 누적 신청 타임 (회)</th>
                </tr>
            </thead>
            <tbody id="class-stat-body">
            </tbody>
        </table>
    </div>

    <div id="tab-personal" class="tab-content">
        <table class="stat-class-table">
            <thead>
                <tr>
                    <th>학급 (반)</th>
                    <th>학번</th>
                    <th>이름</th>
                    <th>신청 횟수 (일/타임)</th>
                    <th>출석 횟수 (일/타임)</th>
                    <th>월간 출석률</th>
                </tr>
            </thead>
            <tbody id="personal-stat-body">
            </tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://hqiijssfdullpfpfidbz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxaWlqc3NmZHVsbHBmcGZpZGJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwOTUyOTgsImV4cCI6MjA5MjY3MTI5OH0.FxDFaCsqE2EwHUCbzt15aPkpFcIjXr-chjd01d87-vs';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let applicationData = [];
    let attendanceLogsData = [];
    let calendarSchedule = { data: {}, defaultDays: [1, 2, 3, 4, 5] };

    document.addEventListener("DOMContentLoaded", () => {
        const now = new Date();
        const monthVal = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        document.getElementById('month-picker').value = monthVal;
        fetchDataAndRender();
    });

    async function fetchDataAndRender() {
        const picker = document.getElementById('month-picker').value;
        if (!picker) return;

        document.getElementById('loading').style.display = 'block';
        document.getElementById('calendar-container').style.display = 'none';

        const [year, month] = picker.split('-').map(Number);
        const targetMonthStr = month + "월";
        const startDate = `${year}-${String(month).padStart(2, '0')}-01`;
        const lastDateObj = new Date(year, month, 0);
        const endDate = `${year}-${String(month).padStart(2, '0')}-${String(lastDateObj.getDate()).padStart(2, '0')}`;

        try {
            const { data: apps } = await supabaseClient.from('applications').select('*').eq('target_month', targetMonthStr);
            applicationData = apps || [];

            const { data: logs } = await supabaseClient.from('attendance_logs')
                .select('date, status, stu_id')
                .gte('date', startDate)
                .lte('date', endDate);
            attendanceLogsData = logs || [];

            const { data: cal } = await supabaseClient.from('settings').select('value').eq('key', 'calendarSchedule').maybeSingle();
            if (cal && cal.value) {
                if (cal.value.data) calendarSchedule.data = JSON.parse(cal.value.data);
                if (cal.value.defaultDays) calendarSchedule.defaultDays = cal.value.defaultDays;
            }

            // 1. 달력 그리기
            renderCalendar(year, month, lastDateObj.getDate());
            // 2. 반별 통계 계산
            renderClassStats(year, month, lastDateObj.getDate());
            // 3. 🌟 추가됨: 개인별 통계 계산 🌟
            renderPersonalStats(year, month, lastDateObj.getDate());

        } catch (error) {
            console.error("데이터 로딩 오류:", error);
            alert("통계 데이터를 불러오는 중 오류가 발생했습니다.");
        } finally {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('calendar-container').style.display = 'block';
        }
    }

    function renderCalendar(year, month, lastDate) {
        const firstDayIdx = new Date(year, month - 1, 1).getDay();
        const daysEng = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
        
        let html = `
            <table class="stat-calendar">
                <thead>
                    <tr>
                        <th style="color:#dc3545;">일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th style="color:#0d6efd;">토</th>
                    </tr>
                </thead>
                <tbody><tr>`;

        for (let i = 0; i < firstDayIdx; i++) {
            html += `<td></td>`;
        }

        for (let d = 1; d <= lastDate; d++) {
            const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const dayIdx = new Date(year, month - 1, d).getDay();
            const dayKey = daysEng[dayIdx];

            let isOperating = calendarSchedule.defaultDays.includes(dayIdx);
            let reason = "";
            if (calendarSchedule.data[dateStr] !== undefined) {
                isOperating = calendarSchedule.data[dateStr].active;
                reason = calendarSchedule.data[dateStr].reason;
            }

            let dateClass = "date-num";
            if (dayIdx === 0) dateClass += " sunday";
            if (dayIdx === 6) dateClass += " saturday";

            const realToday = new Date().toLocaleDateString('en-CA');
            let tdClass = dateStr === realToday ? "today-cell" : "";

            html += `<td class="${tdClass}"><span class="${dateClass}">${d}</span>`;            

            if (!isOperating) {
                html += `<div class="box-holiday">${reason || "야자 미운영"}</div>`;
            } else {
                let t0 = 0, t1 = 0, t2 = 0, t3 = 0;
                applicationData.forEach(app => {
                    if (app[dayKey]) {
                        if (app[dayKey].includes('0')) t0++;
                        if (app[dayKey].includes('1')) t1++;
                        if (app[dayKey].includes('2')) t2++;
                        if (app[dayKey].includes('3')) t3++;
                    }
                });

                let currentPresent = 0;
                let finalResult = 0;
                let absent = 0;

                const dayLogs = attendanceLogsData.filter(log => log.date === dateStr);
                
                dayLogs.forEach(log => {
                    if (log.status === "입실" || log.status === "복귀" || log.status === "외출") {
                        currentPresent++;
                    } else if (log.status === "귀가") {
                        finalResult++;
                    } else {
                        absent++;
                    }
                });

                if ((t0+t1+t2+t3) === 0 && dayLogs.length === 0) {
                    html += `<div style="text-align:center; color:#adb5bd; font-size:11px; margin-top:20px;">신청 데이터 없음</div>`;
                } else {
                    const todayStr = new Date().toLocaleDateString('en-CA');
                    let row3Label = "현재";
                    let row3Color = "#198754";

                    if (dateStr < todayStr) {
                        row3Label = "결과";
                        row3Color = "#6c757d";
                    } else if (dateStr > todayStr) {
                        row3Label = "대기";
                        row3Color = "#adb5bd";
                    }

                    let c0 = 0, c1 = 0, c2 = 0, c3 = 0; 
                    let err0 = 0, err1 = 0, err2 = 0, err3 = 0;

                    applicationData.forEach(app => {
                        if (app[dayKey]) {
                            const studentLog = dayLogs.find(log => String(log.stu_id) === String(app.stu_id));
                            if (studentLog && studentLog.status !== "미입실") {
                                const isError = (studentLog.status === "귀가(누락)");
                                if (app[dayKey].includes('0')) { c0++; if(isError) err0++; }
                                if (app[dayKey].includes('1')) { c1++; if(isError) err1++; }
                                if (app[dayKey].includes('2')) { c2++; if(isError) err2++; }
                                if (app[dayKey].includes('3')) { c3++; if(isError) err3++; }
                            }
                        }
                    });

                    let c0Class = err0 > 0 ? "status-error" : "status-val";
                    let c1Class = err1 > 0 ? "status-error" : "status-val"; 
                    let c2Class = err2 > 0 ? "status-error" : "status-val";
                    let c3Class = err3 > 0 ? "status-error" : "status-val";

                    html += `
                        <div class="stat-box">
                            <div class="apply-grid">
                                <div class="grid-title">구분</div>
                                <div class="grid-item header">0T</div>
                                <div class="grid-item header">1T</div>
                                <div class="grid-item header">2T</div>
                                <div class="grid-item header">3T</div>
                                
                                <div class="grid-title" style="color:#0d6efd;">신청</div>
                                <div class="grid-item val">${t0}</div>
                                <div class="grid-item val">${t1}</div>
                                <div class="grid-item val">${t2}</div>
                                <div class="grid-item val">${t3}</div>

                                <div class="grid-title" style="color:${row3Color};">${row3Label}</div>
                                <div class="grid-item ${c0Class}">${c0}</div> 
                                <div class="grid-item ${c1Class}">${c1}</div>
                                <div class="grid-item ${c2Class}">${c2}</div>
                                <div class="grid-item ${c3Class}">${c3}</div>
                            </div>
                            
                            <div style="display:flex; justify-content:space-between; margin-top:2px;">
                                <div class="box-current" style="flex:1; margin-right:2px; font-size:10px;">
                                    🏃 진행: ${currentPresent}명
                                </div>
                                <div class="box-result" style="flex:1; margin-left:2px; font-size:10px;">
                                    ✅ 귀가: ${finalResult}명
                                </div>
                            </div>
                        </div>
                    `;
                }
            }
            html += `</td>`;
            if ((firstDayIdx + d) % 7 === 0) html += `</tr><tr>`;
        }

        const lastDayIdx = new Date(year, month - 1, lastDate).getDay();
        if (lastDayIdx < 6) {
            for (let i = lastDayIdx + 1; i <= 6; i++) {
                html += `<td></td>`;
            }
        }

        html += `</tr></tbody></table>`;
        document.getElementById('calendar-container').innerHTML = html;
    }

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    function renderClassStats(year, month, lastDate) {
        const tbody = document.getElementById('class-stat-body');
        tbody.innerHTML = '';

        if (!applicationData || applicationData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="color:#6c757d; padding:20px;">해당 월의 신청 데이터가 없습니다.</td></tr>`;
            return;
        }

        let classStats = {};
        const daysEng = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];

        applicationData.forEach(app => {
            const stuIdStr = String(app.stu_id);
            if (stuIdStr.length < 4) return;

            const classCode = stuIdStr.slice(0, -2);
            const grade = classCode.substring(0, 1);
            const classNum = classCode.substring(1);
            const className = `${grade}학년 ${classNum}반`;

            if (!classStats[className]) {
                classStats[className] = { students: new Set(), totalTimes: 0, orderCode: parseInt(classCode) };
            }
            classStats[className].students.add(stuIdStr);
        });

        for (let d = 1; d <= lastDate; d++) {
            const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const dayIdx = new Date(year, month - 1, d).getDay();
            const dayKey = daysEng[dayIdx];

            let isOperating = calendarSchedule.defaultDays.includes(dayIdx);
            if (calendarSchedule.data[dateStr] !== undefined) {
                isOperating = calendarSchedule.data[dateStr].active;
            }

            if (isOperating) {
                applicationData.forEach(app => {
                    if (app[dayKey]) {
                        const stuIdStr = String(app.stu_id);
                        if (stuIdStr.length < 4) return;
                        
                        const classCode = stuIdStr.slice(0, -2);
                        const className = `${classCode.substring(0, 1)}학년 ${classCode.substring(1)}반`;
                        
                        const timesCount = app[dayKey].split(',').filter(v => v.trim() !== "").length;
                        if (classStats[className]) {
                            classStats[className].totalTimes += timesCount;
                        }
                    }
                });
            }
        }

        const sortedClasses = Object.keys(classStats).sort((a, b) => classStats[a].orderCode - classStats[b].orderCode);

        let html = "";
        let totalStudents = 0;
        let totalAllTimes = 0;

        sortedClasses.forEach(cls => {
            const stuCount = classStats[cls].students.size;
            const times = classStats[cls].totalTimes;
            totalStudents += stuCount;
            totalAllTimes += times;

            html += `<tr>
                <td style="font-weight:bold; color:var(--primary);">${cls}</td>
                <td>${stuCount}명</td>
                <td>${times}회</td>
            </tr>`;
        });

        if (sortedClasses.length > 0) {
            html += `<tr style="background:#eef6ff; font-weight:bold; color:#052c65;">
                <td>합계</td>
                <td>${totalStudents}명</td>
                <td>${totalAllTimes}회</td>
            </tr>`;
        }

        tbody.innerHTML = html;
    }

    // 🌟 새로 추가된 개인별 통계 계산 함수 🌟
    function renderPersonalStats(year, month, lastDate) {
        const tbody = document.getElementById('personal-stat-body');
        tbody.innerHTML = ''; // 기존 내용 지우기

        // 데이터가 없으면 안내 문구 표시
        if (!applicationData || applicationData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="color:#6c757d; padding:20px;">해당 월의 신청 데이터가 없습니다.</td></tr>`;
            return;
        }

        let personalStats = {}; // 학생별 통계를 담을 객체 생성
        const daysEng = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];

        // 1. 학생별 기본 정보 초기화 (신청 데이터 기준)
        applicationData.forEach(app => {
            const stuIdStr = String(app.stu_id);
            if (stuIdStr.length < 4) return; // 학번이 비정상적이면 건너뛰기
            
            if (!personalStats[stuIdStr]) {
                personalStats[stuIdStr] = {
                    stu_id: stuIdStr,
                    stu_name: app.stu_name || '-', // 이름이 DB에 있다면 가져오고 없으면 '-'
                    appliedDays: 0,   // 며칠을 신청했는지
                    appliedTimes: 0,  // 몇 타임을 신청했는지 (0T, 1T 등 합산)
                    attendedDays: 0,  // 며칠을 출석했는지
                    attendedTimes: 0  // 몇 타임을 출석했는지
                };
            }
        });

        // 2. 달력의 1일부터 말일까지 하루씩 검사하면서 출석 횟수 계산
        for (let d = 1; d <= lastDate; d++) {
            const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const dayIdx = new Date(year, month - 1, d).getDay();
            const dayKey = daysEng[dayIdx]; // 'mon', 'tue' 등 요일 키값

            // 오늘이 휴무일인지 운영일인지 판단
            let isOperating = calendarSchedule.defaultDays.includes(dayIdx);
            if (calendarSchedule.data[dateStr] !== undefined) {
                isOperating = calendarSchedule.data[dateStr].active;
            }

            // 야자 운영일인 경우에만 계산
            if (isOperating) {
                // 해당 날짜의 전체 출석 기록을 가져옴
                const dayLogs = attendanceLogsData.filter(log => log.date === dateStr);
                
                applicationData.forEach(app => {
                    // 이 학생이 오늘(해당 요일) 야자를 신청했다면
                    if (app[dayKey]) {
                        const stuIdStr = String(app.stu_id);
                        if (stuIdStr.length < 4) return;
                        
                        const stat = personalStats[stuIdStr];
                        
                        // 오늘 신청한 타임 개수 파악 (예: "1,2" 이면 2타임)
                        const timesCount = app[dayKey].split(',').filter(v => v.trim() !== "").length;
                        
                        // 신청 일수와 타임수 증가
                        stat.appliedDays += 1;
                        stat.appliedTimes += timesCount;

                        // 출결 데이터에서 이 학생의 오늘 기록 찾기
                        const studentLog = dayLogs.find(log => String(log.stu_id) === stuIdStr);
                        
                        // 기록이 있고 "미입실"이 아니라면 정상 출석으로 인정!
                        if (studentLog && studentLog.status !== "미입실") {
                            stat.attendedDays += 1;
                            stat.attendedTimes += timesCount;
                        }
                    }
                });
            }
        }

        // 3. 학번 순서대로 정렬하여 표에 출력하기
        // 객체(personalStats)를 배열로 변환 후 정렬
        const sortedStudents = Object.values(personalStats).sort((a, b) => parseInt(a.stu_id) - parseInt(b.stu_id));

        let html = "";
        sortedStudents.forEach(stat => {
            // 학번에서 학급 추출 (예: 2101 -> 2학년 1반)
            const classCode = stat.stu_id.slice(0, -2);
            const className = `${classCode.substring(0, 1)}학년 ${classCode.substring(1)}반`;
            
            // 출석률 계산 (%)
            let rate = 0;
            if (stat.appliedTimes > 0) {
                rate = Math.round((stat.attendedTimes / stat.appliedTimes) * 100);
            }
            
            // 출석률에 따른 색상 변경 (80% 이상 초록색, 50% 미만 빨간색)
            let rateColor = "color: #333;";
            if (rate >= 80) rateColor = "color: #198754;";
            else if (rate < 50) rateColor = "color: #dc3545;";

            // 표의 한 줄(tr)을 생성
            html += `<tr>
                <td>${className}</td>
                <td style="font-weight:bold;">${stat.stu_id}</td>
                <td>${stat.stu_name}</td>
                <td style="color:#6c757d;">${stat.appliedDays}일 <span style="font-size:12px;">(${stat.appliedTimes}타임)</span></td>
                <td style="font-weight:bold; color:#0d6efd;">${stat.attendedDays}일 <span style="font-size:12px;">(${stat.attendedTimes}타임)</span></td>
                <td style="font-weight:bold; ${rateColor}">${rate}%</td>
            </tr>`;
        });

        tbody.innerHTML = html; // 완성된 HTML을 표 안에 삽입
    }
</script>

</body>
</html>
