<!-- [수정본] my-yaja.html -->
<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Yaja - 나의 참여 정보</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .month-btn.active {
            background-color: #764ba2;
            color: white;
            border-color: #764ba2;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">

    <div class="gradient-bg text-white p-6 text-center shadow-lg">
        <h1 class="text-2xl font-bold">안성여고 야간 자기주도학습</h1>
        <p class="text-sm opacity-80 mt-1">나의 월별 참여 현황 확인</p>
    </div>

    <div class="max-w-md mx-auto p-4">
        <!-- 학번 입력 영역 -->
        <div class="card p-6 mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2">학번 입력</label>
            <div class="flex gap-2">
                <input type="number" id="stu_id" placeholder="예: 30101"
                    onkeyup="if(window.event.keyCode==13){initCheck()}"
                    class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                <button onclick="initCheck()"
                    class="bg-purple-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-purple-700 transition">
                    조회
                </button>
            </div>
            <p id="msg" class="text-red-500 text-xs mt-2 hidden"></p>
        </div>

        <!-- 달 선택 영역 (인증 후 표시) -->
        <div id="month_selector" class="flex gap-2 mb-4 hidden">
            <button id="btn_last_month" onclick="selectMonth('last')"
                class="month-btn flex-1 py-2 rounded-lg border-2 border-gray-300 bg-white font-bold text-gray-600 transition"></button>
            <button id="btn_this_month" onclick="selectMonth('this')"
                class="month-btn flex-1 py-2 rounded-lg border-2 border-gray-300 bg-white font-bold text-gray-600 transition"></button>
        </div>

        <div id="result_area" class="hidden animate-fade-in">
            <div class="card p-6 mb-4 text-center">
                <h2 id="user_name" class="text-xl font-bold text-gray-800 mb-4">학생 참여 현황</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-purple-50 p-4 rounded-xl">
                        <p id="rank_title" class="text-gray-500 text-[10px] uppercase">월간 등수</p>
                        <p class="text-2xl font-black text-purple-600"><span id="my_rank">-</span>위</p>
                    </div>
                    <div class="bg-blue-50 p-4 rounded-xl">
                        <p id="count_title" class="text-gray-500 text-[10px] uppercase">월간 참여</p>
                        <p class="text-2xl font-black text-blue-600"><span id="total_count">-</span>회</p>
                    </div>
                </div>
            </div>

            <div id="fixed_seat_alert" class="card p-4 mb-4 border-l-4"></div>

            <div class="card p-4">
                <h3 class="text-sm font-bold text-gray-700 mb-3 border-b pb-2">기록 상세</h3>
                <ul id="log_list" class="text-sm text-gray-600 divide-y"></ul>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://hqiijssfdullpfpfidbz.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxaWlqc3NmZHVsbHBmcGZpZGJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwOTUyOTgsImV4cCI6MjA5MjY3MTI5OH0.FxDFaCsqE2EwHUCbzt15aPkpFcIjXr-chjd01d87-vs';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentStuId = "";
        let thisMonthStr = ""; // YYYY-MM
        let lastMonthStr = ""; // YYYY-MM

        // 초기 날짜 설정
        const now = new Date();
        thisMonthStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        const lastMonthDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
        lastMonthStr = `${lastMonthDate.getFullYear()}-${String(lastMonthDate.getMonth() + 1).padStart(2, '0')}`;

        document.getElementById('btn_this_month').innerText = `${now.getMonth() + 1}월 현황`;
        document.getElementById('btn_last_month').innerText = `${lastMonthDate.getMonth() + 1}월 현황`;

        function initCheck() {
            const input = document.getElementById('stu_id').value.trim();
            if (!input) return alert("학번을 입력하세요.");
            currentStuId = input;
            document.getElementById('month_selector').classList.remove('hidden');
            selectMonth('this'); // 인증 시 이번 달 기본 선택
        }

        async function selectMonth(type) {
            const targetMonth = (type === 'this') ? thisMonthStr : lastMonthStr;

            // 버튼 스타일 변경
            document.querySelectorAll('.month-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(type === 'this' ? 'btn_this_month' : 'btn_last_month').classList.add('active');

            await checkMyStatus(targetMonth);
        }


        // 타임 횟수를 계산하는 헬퍼 함수 추가
        function getTimeSlots(status, history) {
            if (status === '미입실' || status === '귀가(누락)') return 0;

            let count = 0;
            if (history && Array.isArray(history)) {
                let slots = new Set();
                history.forEach(h => {
                    // 기록(history) 배열 안에 1T, 2타임 등의 키워드가 포함되어 있는지 확인
                    if (h.includes('1T') || h.includes('1타임')) slots.add(1);
                    if (h.includes('2T') || h.includes('2타임')) slots.add(2);
                    if (h.includes('3T') || h.includes('3타임')) slots.add(3);
                });
                count = slots.size;
            }
            // 정상 입실 기록은 있지만 타임 정보가 명확히 파악되지 않는 경우 기본 1타임 인정
            return count > 0 ? count : 1;
        }

        async function checkMyStatus(month) {
            const msgElement = document.getElementById('msg');
            try {
                msgElement.classList.add('hidden');

                // 1. 전체 데이터 가져오기 (history 포함)
                const { data: allData, error: rankError } = await supabaseClient
                    .from('attendance_logs')
                    .select('stu_id, date, status, history')
                    .like('date', `${month}%`);

                if (rankError) throw rankError;

                // 단순 일수가 아닌 '타임 횟수'를 기준으로 합산하도록 수정
                const counts = allData.reduce((acc, curr) => {
                    const slots = getTimeSlots(curr.status, curr.history);
                    acc[curr.stu_id] = (acc[curr.stu_id] || 0) + slots;
                    return acc;
                }, {});

                const sortedIds = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
                const rank = sortedIds.indexOf(currentStuId) + 1;
                const myCount = counts[currentStuId] || 0;

                if (myCount === 0) {
                    msgElement.innerText = `${month}월의 참여 기록이 없습니다.`;
                    msgElement.classList.remove('hidden');
                    document.getElementById('result_area').classList.add('hidden');
                    return;
                }

                // 2. 학생 정보 및 상세 로그 가져오기 (history 포함)
                const { data: userData } = await supabaseClient
                    .from('applications')
                    .select('stu_name')
                    .eq('stu_id', currentStuId)
                    .maybeSingle();

                const { data: logs } = await supabaseClient
                    .from('attendance_logs')
                    .select('date, status, history')
                    .eq('stu_id', currentStuId)
                    .like('date', `${month}%`)
                    .order('date', { ascending: false });

                // UI 업데이트
                document.getElementById('result_area').classList.remove('hidden');
                document.getElementById('user_name').innerText = `${userData?.stu_name || '학생'}님의 ${month.split('-')[1]}월 현황`;
                document.getElementById('my_rank').innerText = rank;
                document.getElementById('total_count').innerText = myCount;
                document.getElementById('rank_title').innerText = `${month.split('-')[1]}월 등수`;

                const logList = document.getElementById('log_list');
                logList.innerHTML = logs.map(log => {
                    const slots = getTimeSlots(log.status, log.history);

                    // 상태 및 타임 수에 따른 디자인 분기
                    const isSuccess = ['입실', '복귀', '귀가', '외출', '출석'].includes(log.status);
                    const statusColor = isSuccess ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600';
                    const slotBadge = slots > 0
                        ? `<span class="ml-2 text-[11px] font-extrabold text-purple-600 border border-purple-200 bg-purple-50 px-2 py-0.5 rounded-full">${slots}타임 인정</span>`
                        : '';

                    return `
                    <li class="flex justify-between items-center py-3">
                        <div class="flex items-center">
                            <span class="font-medium text-gray-700">${log.date}</span>
                            ${slotBadge}
                        </div>
                        <span class="px-2 py-1 rounded text-xs font-bold ${statusColor}">${log.status}</span>
                    </li>
                    `;
                }).join('');

                const alertBox = document.getElementById('fixed_seat_alert');
                if (rank <= 40) {
                    alertBox.className = "card p-4 mb-4 border-l-4 border-green-500 bg-green-50";
                    alertBox.innerHTML = `<p class="text-sm text-green-800 font-medium">🎉 현재 <strong>고정석 안정권</strong>(${rank}위)입니다!</p>`;
                } else {
                    alertBox.className = "card p-4 mb-4 border-l-4 border-orange-500 bg-orange-50";
                    alertBox.innerHTML = `<p class="text-sm text-orange-800 font-medium">💪 고정석(40위)까지 조금만 더! (현재 ${rank}위)</p>`;
                }

            } catch (error) {
                console.error(error);
                alert("조회 중 오류가 발생했습니다.");
            }
        }
    </script>
</body>

</html>
