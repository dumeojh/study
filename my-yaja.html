<!-- [수정본] my-yaja.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Yaja - 나의 참여 정보</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="gradient-bg text-white p-6 text-center shadow-lg">
        <h1 class="text-2xl font-bold">안성여고 야간 자기주도학습</h1>
        <p class="text-sm opacity-80 mt-1">나의 야자 참여율 및 고정석 랭킹 확인</p>
    </div>

    <div class="max-w-md mx-auto p-4">
        <div class="card p-6 mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2">학번 입력</label>
            <div class="flex gap-2">
                <!-- 🌟 onkeyup 이벤트를 추가하여 엔터 키 감지 -->
                <input type="number" id="stu_id" placeholder="예: 30101" 
                    onkeyup="if(window.event.keyCode==13){checkMyStatus()}"
                    class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                <button onclick="checkMyStatus()" 
                    class="bg-purple-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-purple-700 transition">
                    조회
                </button>
            </div>
            <p id="msg" class="text-red-500 text-xs mt-2 hidden">학번을 확인해주세요.</p>
        </div>

        <div id="result_area" class="hidden animate-fade-in">
            <div class="card p-6 mb-4 text-center">
                <h2 id="user_name" class="text-xl font-bold text-gray-800 mb-4">학생 참여 현황</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-purple-50 p-4 rounded-xl">
                        <p class="text-gray-500 text-xs uppercase">현재 등수</p>
                        <p class="text-2xl font-black text-purple-600"><span id="my_rank">-</span>위</p>
                    </div>
                    <div class="bg-blue-50 p-4 rounded-xl">
                        <p class="text-gray-500 text-xs uppercase">총 참여 횟수</p>
                        <p class="text-2xl font-black text-blue-600"><span id="total_count">-</span>회</p>
                    </div>
                </div>
            </div>

            <div id="fixed_seat_alert" class="card p-4 mb-4 border-l-4">
                <!-- 알림 메시지 영역 -->
            </div>

            <div class="card p-4">
                <h3 class="text-sm font-bold text-gray-700 mb-3 border-b pb-2">최근 참여 기록 (최근 10회)</h3>
                <ul id="log_list" class="text-sm text-gray-600 divide-y"></ul>
            </div>
        </div>
    </div>

<script>
    const supabaseUrl = 'https://hqiijssfdullpfpfidbz.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxaWlqc3NmZHVsbHBmcGZpZGJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwOTUyOTgsImV4cCI6MjA5MjY3MTI5OH0.FxDFaCsqE2EwHUCbzt15aPkpFcIjXr-chjd01d87-vs';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    async function checkMyStatus() {
        const stuIdInput = document.getElementById('stu_id');
        const msgElement = document.getElementById('msg');
        const stuIdRaw = stuIdInput.value.trim();
        
        if(!stuIdRaw) {
            alert("학번을 입력해주세요.");
            return;
        }

        try {
            msgElement.classList.add('hidden');

            // 1. 전체 출결 데이터를 가져와 랭킹 계산
            const { data: allData, error: rankError } = await supabaseClient
                .from('attendance_logs') 
                .select('stu_id');

            if(rankError) throw rankError;

            // 학번별 출석 횟수 집계
            const counts = allData.reduce((acc, curr) => {
                const id = curr.stu_id;
                acc[id] = (acc[id] || 0) + 1;
                return acc;
            }, {});

            // 내림차순 정렬하여 순위 도출
            const sortedIds = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
            const rank = sortedIds.indexOf(stuIdRaw) + 1;
            const myCount = counts[stuIdRaw] || 0;

            if(myCount === 0) {
                msgElement.innerText = "참여 기록이 없습니다.";
                msgElement.classList.remove('hidden');
                document.getElementById('result_area').classList.add('hidden');
                return;
            }

            // 2. 학생 이름 정보 가져오기
            const { data: userData } = await supabaseClient
                .from('applications')
                .select('stu_name')
                .eq('stu_id', stuIdRaw)
                .maybeSingle();

            // 3. 최근 상세 로그 가져오기[cite: 19]
            const { data: logs } = await supabaseClient
                .from('attendance_logs')
                .select('date, status')
                .eq('stu_id', stuIdRaw)
                .order('date', { ascending: false })
                .limit(10);

            // 화면 데이터 업데이트[cite: 19]
            document.getElementById('result_area').classList.remove('hidden');
            document.getElementById('user_name').innerText = `${userData?.stu_name || '학생'}님의 참여 현황`;
            document.getElementById('my_rank').innerText = rank;
            document.getElementById('total_count').innerText = myCount;

            // 로그 리스트 생성[cite: 19]
            const logList = document.getElementById('log_list');
            logList.innerHTML = logs.map(log => `
                <li class="flex justify-between items-center py-3">
                    <span class="font-medium text-gray-700">${log.date}</span>
                    <span class="px-2 py-1 rounded text-xs font-bold ${log.status === '출석' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'}">${log.status}</span>
                </li>
            `).join('') || '<li class="py-4 text-center text-gray-400">기록이 없습니다.</li>';

            // 고정석 안내 메시지 업데이트[cite: 19]
            const alertBox = document.getElementById('fixed_seat_alert');
            if(rank <= 40) {
                alertBox.className = "card p-4 mb-4 border-l-4 border-green-500 bg-green-50";
                alertBox.innerHTML = `<p class="text-sm text-green-800 font-medium">🎉 현재 <strong>고정석 안정권</strong>(${rank}위)입니다!</p>`;
            } else {
                alertBox.className = "card p-4 mb-4 border-l-4 border-orange-500 bg-orange-50";
                alertBox.innerHTML = `<p class="text-sm text-orange-800 font-medium">💪 고정석(40위)까지 조금만 더! (현재 ${rank}위)</p>`;
            }

        } catch (error) {
            console.error(error);
            alert("조회 중 오류가 발생했습니다.");
        }
    }
</script>
</body>
</html>
