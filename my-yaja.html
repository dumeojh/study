<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Yaja - 나의 참여 정보</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- 헤더 -->
    <div class="gradient-bg text-white p-6 text-center shadow-lg">
        <h1 class="text-2xl font-bold">안성여고 교육과정 박람회</h1>
        <p class="text-sm opacity-80 mt-1">나의 야자 참여율 및 고정석 랭킹 확인</p>
    </div>

    <div class="max-w-md mx-auto p-4">
        <!-- 조회 섹션 -->
        <div class="card p-6 mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2">학번 입력</label>
            <div class="flex gap-2">
                <input type="number" id="stu_id" placeholder="예: 30101" 
                    class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                <button onclick="checkMyStatus()" 
                    class="bg-purple-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-purple-700 transition">
                    조회
                </button>
            </div>
            <p id="msg" class="text-red-500 text-xs mt-2 hidden">학번을 확인해주세요.</p>
        </div>

        <!-- 결과 표시 섹션 (기본 숨김) -->
        <div id="result_area" class="hidden animate-fade-in">
            <!-- 요약 카드 -->
            <div class="card p-6 mb-4 text-center">
                <h2 id="user_name" class="text-xl font-bold text-gray-800 mb-4">OOO 학생의 참여 현황</h2>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-purple-50 p-4 rounded-xl">
                        <p class="text-gray-500 text-xs uppercase">현재 등수</p>
                        <p class="text-2xl font-black text-purple-600"><span id="my_rank">-</span>위</p>
                    </div>
                    <div class="bg-blue-50 p-4 rounded-xl">
                        <p class="text-gray-500 text-xs uppercase">총 참여 횟수</p>
                        <p class="text-2xl font-black text-blue-600"><span id="total_count">-</span>회</p>
                    </div>
                </div>
            </div>

            <!-- 고정석 안내 -->
            <div id="fixed_seat_alert" class="card p-4 mb-4 border-l-4 border-green-500 bg-green-50">
                <p class="text-sm text-green-800 font-medium leading-relaxed">
                    🎉 현재 <strong>고정석 안정권</strong>입니다!<br>
                    이 페이스를 유지하여 자리를 확보하세요.
                </p>
            </div>

            <!-- 상세 리스트 -->
            <div class="card p-4">
                <h3 class="text-sm font-bold text-gray-700 mb-3 border-b pb-2">최근 참여 기록</h3>
                <ul id="log_list" class="text-sm text-gray-600 divide-y">
                    <!-- 로그가 여기에 삽입됨 -->
                </ul>
            </div>
        </div>
    </div>

    <script>
        // Supabase 설정 (기본 정보 입력 필요)
        const supabaseUrl = 'YOUR_SUPABASE_URL';
        const supabaseKey = 'YOUR_SUPABASE_KEY';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function checkMyStatus() {
            const stuId = document.getElementById('stu_id').value;
            if(!stuId) return;

            // 1. 전체 랭킹 데이터 가져오기 (참여 횟수 기준 정렬)
            // 실제 구현 시 'view'나 별도의 통계 쿼리를 사용하면 더 빠릅니다.
            const { data: allData, error: rankError } = await supabase
                .from('attendance_logs') // 기존 사용하시던 테이블명
                .select('stu_id');

            if(rankError) return;

            // 학번별로 횟수 집계
            const counts = allData.reduce((acc, curr) => {
                acc[curr.stu_id] = (acc[curr.stu_id] || 0) + 1;
                return acc;
            }, {});

            // 내림차순 정렬하여 등수 계산
            const sortedIds = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
            const rank = sortedIds.indexOf(stuId) + 1;
            const myCount = counts[stuId] || 0;

            if(myCount === 0) {
                document.getElementById('msg').innerText = "참여 기록이 없습니다.";
                document.getElementById('msg').classList.remove('hidden');
                return;
            }

            // 2. 학생 이름 가져오기 (applications 테이블 등 활용)
            const { data: userData } = await supabase
                .from('applications')
                .select('name')
                .eq('stu_id', stuId)
                .single();

            // 화면 표시
            document.getElementById('result_area').classList.remove('hidden');
            document.getElementById('user_name').innerText = `${userData?.name || '학생'}님의 참여 현황`;
            document.getElementById('my_rank').innerText = rank;
            document.getElementById('total_count').innerText = myCount;

            // 고정석 기준 안내 (예: 상위 40등 기준)
            const alertBox = document.getElementById('fixed_seat_alert');
            if(rank <= 40) {
                alertBox.className = "card p-4 mb-4 border-l-4 border-green-500 bg-green-50";
                alertBox.innerHTML = `<p class="text-sm text-green-800">🎉 현재 <strong>고정석 안정권</strong>(${rank}위)입니다!</p>`;
            } else {
                alertBox.className = "card p-4 mb-4 border-l-4 border-orange-500 bg-orange-50";
                alertBox.innerHTML = `<p class="text-sm text-orange-800">💪 고정석까지 조금 더 힘내세요! (현재 ${rank}위)</p>`;
            }
        }
    </script>
</body>
</html>
