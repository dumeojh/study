// 🌟 [추가] 에러 발생 시 삐-삐-삐 소리를 내는 기계음 함수
function playErrorBeep() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function beep(time, freq) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = 'square'; // 경고음에 어울리는 기계음 소리
            gain.gain.setValueAtTime(0.15, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
            osc.start(time);
            osc.stop(time + 0.15);
        }
        // 0.2초 간격으로 3번 연속 빠르고 크게 울림
        beep(audioCtx.currentTime, 600);
        beep(audioCtx.currentTime + 0.2, 600);
        beep(audioCtx.currentTime + 0.4, 600);
    } catch(e) { 
        console.error("오디오 재생 에러:", e); 
    }
}

    // 🌟 [추가] 한글 타자를 영문 QWERTY 배열로 자동 변환해주는 함수
function convertKorToEng(text) {
    const cho = ["r","R","s","e","E","f","a","q","Q","t","T","d","w","W","c","z","x","v","g"];
    const jung = ["k","o","i","O","j","p","u","P","h","hk","ho","hl","y","n","nj","np","nl","b","m","ml","l"];
    const jong = ["","r","R","rt","s","sw","sg","e","f","fr","fa","fq","ft","fx","fv","fg","a","q","qt","t","T","d","w","c","z","x","v","g"];
    const jamoMap = {
        'ㄱ':'r','ㄲ':'R','ㄳ':'rt','ㄴ':'s','ㄵ':'sw','ㄶ':'sg','ㄷ':'e','ㄸ':'E','ㄹ':'f','ㄺ':'fr','ㄻ':'fa','ㄼ':'fq','ㄽ':'ft','ㄾ':'fx','ㄿ':'fv','ㅀ':'fg','ㅁ':'a','ㅂ':'q','ㅃ':'Q','ㅄ':'qt','ㅅ':'t','ㅆ':'T','ㅇ':'d','ㅈ':'w','ㅉ':'W','ㅊ':'c','ㅋ':'z','ㅌ':'x','ㅍ':'v','ㅎ':'g',
        'ㅏ':'k','ㅐ':'o','ㅑ':'i','ㅒ':'O','ㅓ':'j','ㅔ':'p','ㅕ':'u','ㅖ':'P','ㅗ':'h','ㅘ':'hk','ㅙ':'ho','ㅚ':'hl','ㅛ':'y','ㅜ':'n','ㅝ':'nj','ㅞ':'np','ㅟ':'nl','ㅠ':'b','ㅡ':'m','ㅢ':'ml','ㅣ':'l'
    };

    let result = "";
    for (let i = 0; i < text.length; i++) {
        let code = text.charCodeAt(i);
        if (code >= 44032 && code <= 55203) { // 완전한 글자 (예: '가')
            code -= 44032;
            let c = Math.floor(code / (21 * 28));
            let j = Math.floor((code % (21 * 28)) / 28);
            let jo = (code % (21 * 28)) % 28;
            result += cho[c] + jung[j] + jong[jo];
        } else if (code >= 12593 && code <= 12643) { // 자음/모음 낱개 (예: 'ㅛ', 'ㅊ')
            result += jamoMap[text[i]] || text[i];
        } else { // 숫자나 이미 영문인 경우
            result += text[i];
        }
    }
    return result;
}

// 🌟 1차 검증 함수 (학번, 이름 맞는지 검사)
    async function processCheckInOut() {
        let rawId = scannerInput.value.trim();
        if (!rawId) return;

        // 🌟 [핵심 변경] 한글로 잘못 스캔된 값을 영문으로 바꾸고 대문자로 통일!

        // 예: id가 "3301C"인데 serverBarcodes에 있으면, id를 "3301"로 바꿔버림.

            return;

        // [3단계] 학번 + 이름 모두 일치해야 통과
        if (authMode === "3") {
// ... (이 아래 코드는 기존과 동일하게 유지) ...

        }

    // 🌟 실제 출결 DB 처리 로직 (원래 있던 긴 코드들)
    async function executeLogic(id, studentName) {
        scannerInput.value = ""; nameInput.value = ""; 
        
        const now = new Date();
        const currentMonthStr = (now.getMonth() + 1) + "월";
        const todayDayEng = ['sun','mon','tue','wed','thu','fri','sat'][now.getDay()];

        try {
            const appQuery = await db.collection("applications").where("stuId", "==", id).where("targetMonth", "==", currentMonthStr).get();
            if (appQuery.empty) {
                showReceipt(studentName, "입실 불가", "신청 내역 없음", `이번 달(${currentMonthStr}) 야자 신청자가 아닙니다.`, "#dc3545");
                return; 
            }
            const appData = appQuery.docs[0].data();
            if (!appData[todayDayEng]) {
                 showReceipt(studentName, "입실 불가", "오늘 신청 아님", "오늘은 야자를 신청한 요일이 아닙니다.", "#dc3545");
                 return; 
            }

            if (appData.type === "자율석") {
                // [수정된 코드] 오늘 날짜 문서 1개만 열어서 해당 학생 학번이 존재하는지만 쏙 빼서 확인
                const ticketDoc = await db.collection("daily_reservations_v2").doc(todayStr).get();
                
                if (!ticketDoc.exists || !ticketDoc.data()[id]) {
                    playErrorBeep(); 
                    showReceipt(studentName, "발권 필요 ⚠️", "자리를 배정받지 않음", "일일 발권기에서 먼저 자리를 선택하고 오세요!", "#dc3545", true);
                    return; 
                }
            }

            const logId = `${todayStr}_${id}`;
            const logDoc = await db.collection("attendance_logs").doc(logId).get();
            const logData = logDoc.exists ? logDoc.data() : null;
            const lastStatus = logData ? logData.status : "미입실";

            if (logData && logData.lastUpdateTime) {
                const diffSec = Math.floor((now - logData.lastUpdateTime.toDate()) / 1000);
                if (diffSec < 40) {
                    showReceipt(studentName, "방금 처리됨", `${diffSec}초 전에 [${lastStatus}] 처리되었습니다.`, "잠시 후 이용해 주세요.", "#6c757d");
                    return;
                }
            }

            if (lastStatus === "미입실") saveAttendance(id, studentName, "입실", now);
            else if (lastStatus === "입실" || lastStatus === "복귀") showSmartSelection(id, studentName); 
            else if (lastStatus === "외출") saveAttendance(id, studentName, "복귀", now);
            else if (lastStatus === "귀가") showReceipt(studentName, "이미 귀가함", "최종 귀가 처리된 학생입니다.", "재입실은 관리자에게 문의하세요.", "#6c757d");

        } catch (e) { showReceipt("오류", "통신 실패", "연결 상태 확인 요망", e.message, "#dc3545"); }
    }

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button onclick="confirmSelection('${id}', '${name}', '외출')" style="flex: 1; padding: 25px; font-size: 20px; font-weight: bold; background: var(--out); border: none; border-radius: 10px; cursor: pointer;">잠시 외출</button>
            <button onclick="confirmSelection('${id}', '${name}', '귀가')" style="flex: 1; padding: 25px; font-size: 20px; font-weight: bold; background: var(--home); color: white; border: none; border-radius: 10px; cursor: pointer;">최종 귀가</button>
        </div>
        <div id="cancel-timer" style="margin-top: 15px; color: #dc3545; font-weight: bold;">(10초 뒤 자동 취소됩니다)</div>
    `;

    document.getElementById('result-overlay').style.display = 'flex';

    // 🌟 자동 취소 타이머 작동 (10초)
    let timeLeft = 10;
    if(selectionTimer) clearInterval(selectionTimer);
    selectionTimer = setInterval(() => {
        timeLeft--;
        document.getElementById('cancel-timer').innerText = `(${timeLeft}초 뒤 자동 취소됩니다)`;
        if (timeLeft <= 0) {
            clearInterval(selectionTimer);
            document.getElementById('result-overlay').style.display = 'none';
            focusScanner();
        }
    }, 1000);
}

// 🌟 [추가] 선택 버튼 클릭 시 처리
function confirmSelection(id, name, status) {
    if(selectionTimer) clearInterval(selectionTimer);
    saveAttendance(id, name, status, new Date());
}

// saveAttendance, showReceipt, selectStatus 등은 기존과 동일...
    

// 🌟 [추가함수 1] 실제로 DB에 저장하는 함수 (공통 사용)
async function saveAttendance(id, name, status, timeObj) {
    const logId = `${todayStr}_${id}`;
    const timeStr = timeObj.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit' });
    
    await db.collection("attendance_logs").doc(logId).set({
        date: todayStr, stuId: id, stuName: name, status: status, 
        lastUpdateTime: timeObj,
        history: firebase.firestore.FieldValue.arrayUnion(`${status} (${timeStr})`)
    }, { merge: true });

    let color = status === "입실" ? "#0d6efd" : (status === "복귀" ? "#198754" : (status === "외출" ? "#b38200" : "#dc3545"));
    showReceipt(name, status + " 완료", `처리시간: ${timeStr}`, "정상 처리되었습니다.", color);
}

    

// 🌟 1) 매개변수 맨 끝에 isUrgent = false 를 추가합니다.
function showReceipt(name, status, timeInfo, msg, color, isUrgent = false) { 
    
    // 1. 시각적 알림 강화: 상태에 따라 키오스크 배경색 변경
    const container = document.querySelector('.kiosk-box');
    const originalBg = "#ffffff"; // 기본 하얀색
    
    // '귀가' 포함 시 연한 빨강, 그 외(입실/복귀)는 연한 파랑/녹색 계열로 피드백
    if (status.includes("귀가")) {
        container.style.backgroundColor = "#fff5f5"; // 귀가 경고색
    } else if (status.includes("입실") || status.includes("복귀")) {
        container.style.backgroundColor = "#f0f9ff"; // 입실 확인색
    }

    // 🌟 2) 새로 추가되는 깜빡임 제어 로직! (영수증 박스 선택)
    const receiptBox = document.querySelector('.receipt');
    if (isUrgent) {
        receiptBox.classList.add('blink-warning'); // 클래스 붙여서 깜빡이게
    } else {
        receiptBox.classList.remove('blink-warning'); // 평소엔 제거
    }

    // 2. 결과 데이터 표시
    document.getElementById('r-name').innerText = name;
    document.getElementById('r-status').innerText = status;
    document.getElementById('r-status').style.color = color;
    document.getElementById('r-time').innerText = timeInfo;
    document.getElementById('r-msg').innerText = msg;
    
    // 3. 결과 오버레이 표시
    const overlay = document.getElementById('result-overlay');
    overlay.style.display = 'flex';

    // 4. 초기화 로직 (2.5초 후 실행)
    setTimeout(() => {
        overlay.style.display = 'none';
        container.style.backgroundColor = originalBg;
        
        selectStatus('입실', document.querySelector('.btn-in')); 
        
        const scannerInput = document.getElementById('scanner-input');
        scannerInput.value = "";
        focusScanner();
        
        console.log("시스템이 다음 학생을 위해 [입실] 모드로 자동 초기화되었습니다.");
    }, 2500); 
}
</script>
