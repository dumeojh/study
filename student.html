    <!-- 📱 모바일 앱(PWA) 설정 -->

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6 select-none">

    <!-- 🌟 1. 처음 들어왔을 때 보여줄 명언 화면 (영어 발음 기능 추가) -->
    <div id="quote-screen"
        class="fixed inset-0 bg-purple-900 text-white flex flex-col items-center justify-center p-8 z-50 transition-opacity duration-500">
        <!-- 터치 구역 분리를 위해 내부에 컨테이너 배치 -->
        <div class="text-center max-w-sm space-y-6">
            <div class="text-5xl">🌙</div>

            <!-- 영어 명언 (여기를 읽게 됩니다) -->
            <h2 id="quote-eng" class="text-xl md:text-2xl font-bold leading-relaxed">
                "The secret of getting ahead is getting started."
            </h2>

            <!-- 한국어 번역 -->
            <p id="quote-kor" class="text-purple-200 text-base break-keep">
                "앞서가는 방법의 비밀은 시작하는 것이다."
            </p>

            <p id="quote-author" class="text-purple-300 text-xs">- Mark Twain -</p>

            <!-- 🔊 영어 듣기 버튼 (이 버튼을 누르면 영어 발음이 나옵니다) -->
            <button id="btn-speak"
                class="mx-auto mt-4 flex items-center gap-2 bg-purple-700 hover:bg-purple-600 active:scale-95 text-white font-medium py-2 px-5 rounded-full shadow-md transition-all text-sm">
                <span>🔊</span> 영어 발음 듣기
            </button>

            <!-- 다음으로 진행하기 버튼 -->
            <button id="btn-next"
                class="w-full mt-8 bg-white text-purple-950 font-bold py-3 px-6 rounded-xl shadow-lg active:scale-98 transition-all">
                터치해서 시작하기 →
            </button>
        </div>
    </div>


    <!-- 🏫 2. 내용을 담는 메인 박스 (처음에는 숨겨둠) -->
    <div id="main-content" class="max-w-md w-full space-y-6 hidden">

        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-purple-700"><span aria-hidden="true">🏫</span> 안성여고 야자 시스템</h1>
            <p class="text-gray-500 mt-2">원하시는 서비스를 선택하세요.</p>
        </div>

        <a href="my-yaja.html" class="block">
            <div
                class="menu-card bg-white p-6 rounded-2xl border-l-8 border-purple-500 shadow-sm flex items-center justify-between">
                <div>
                    <h2 class="text-lg font-bold text-gray-800"><span aria-hidden="true">📊</span> 나의 참여 정보</h2>
                    <p class="text-sm text-gray-500">출석 횟수 및 고정석 순위 확인</p>
                </div>
                <span class="text-3xl" aria-hidden="true">🏆</span>
            </div>
        </a>

        <a href="daily_ticket.html" class="block">
            <div
                class="menu-card bg-white p-6 rounded-2xl border-l-8 border-green-500 shadow-sm flex items-center justify-between">
                <div>
                    <h2 class="text-lg font-bold text-gray-800"><span aria-hidden="true">🎫</span> 자율석 일일 발권</h2>
                    <p class="text-sm text-gray-500">오늘 앉을 자율석 자리 선택</p>
                </div>
                <span class="text-3xl" aria-hidden="true">📍</span>
            </div>
        </a>

        <a href="sign_up.html" class="block">
            <div
                class="menu-card bg-white p-6 rounded-2xl border-l-8 border-blue-500 shadow-sm flex items-center justify-between">
                <div>
                    <h2 class="text-lg font-bold text-gray-800"><span aria-hidden="true">✍️</span> 야간 자율학습 신청</h2>
                    <p class="text-sm text-gray-500">월간 신청 종류 및 요일 변경</p>
                </div>
                <span class="text-3xl" aria-hidden="true">⚙️</span>
            </div>
        </a>

        <div class="text-center pt-4">
            <p class="text-xs text-gray-400">© 2026 안성여자고등학교 야간 자율학습 관리</p>

    <!-- 스크립트 영역 -->
    <script>
        // 📚 영어 명언 데이터베이스 (오류 수정 완료)
        const quotes = [
            { eng: "The secret of getting ahead is getting started.", kor: "앞서가는 방법의 비밀은 시작하는 것이다.", author: "Mark Twain" },
            { eng: "Believe you can and you're halfway there.", kor: "할 수 있다고 믿어라. 이미 절반은 온 것이다.", author: "Theodore Roosevelt" },
            { eng: "Don't watch the clock; do what it does. Keep going.", kor: "시계를 보지 마라. 시계가 하는 대로 계속 나아가라.", author: "Sam Levenson" },
            { eng: "It always seems impossible until it's done.", kor: "끝나기 전까지는 언제나 불가능해 보인다.", author: "Nelson Mandela" },
            { eng: "The only way to do great work is to love what you do.", kor: "위대한 일을 하는 유일한 방법은 당신이 하는 일을 사랑하는 것이다.", author: "Steve Jobs" },
            { eng: "Success is the sum of small efforts, repeated day in and day out.", kor: "성공은 매일 반복되는 작은 노력들의 합산이다.", author: "Robert Collier" },
            { eng: "Our greatest weakness lies in giving up.", kor: "우리의 가장 큰 약점은 포기하는 것에 있다.", author: "Thomas Edison" },
            { eng: "The beautiful thing about learning is that no one can take it away from you.", kor: "배움의 아름다운 점은 아무도 그것을 당신에게서 빼앗을 수 없다는 것이다.", author: "B.B. King" },
            { eng: "Opportunities don't happen, you create them.", kor: "기회는 일어나는 것이 아니라, 당신이 만드는 것이다.", author: "Chris Grosser" },
            { eng: "There are no shortcuts to any place worth going.", kor: "갈 만한 가치가 있는 곳으로 가는 지름길은 없다.", author: "Beverly Sills" },
            { eng: "The future depends on what you do today.", kor: "미래는 오늘 네가 무엇을 하느냐에 달려 있다.", author: "Mahatma Gandhi" },
            { eng: "Strive not to be a success, but rather to be of value.", kor: "성공하기보다 가치 있는 사람이 되기 위해 노력하라.", author: "Albert Einstein" },
            { eng: "You miss 100% of the shots you don't take.", kor: "시도조차 하지 않은 슛은 100% 빗나간 것과 같다.", author: "Wayne Gretzky" },
            { eng: "The only limit to our realization of tomorrow will be our doubts of today.", kor: "내일의 실현을 가로막는 유일한 장애물은 오늘의 의심이다.", author: "Franklin D. Roosevelt" },
            { eng: "Do what you can, with what you have, where you are.", kor: "지금 있는 곳에서, 가진 것을 가지고, 할 수 있는 일을 하라.", author: "Theodore Roosevelt" },
            { eng: "In the middle of every difficulty lies opportunity.", kor: "모든 어려움의 한가운데에는 기회가 숨겨져 있다.", author: "Albert Einstein" },
            { eng: "The best way to predict the future is to create it.", kor: "미래를 예측하는 가장 좋은 방법은 스스로 미래를 만드는 것이다.", author: "Peter Drucker" },
            { eng: "It is never too late to be what you might have been.", kor: "되기를 꿈꿨던 사람이 되기에 결코 늦은 때란 없다.", author: "George Eliot" },
            { eng: "The mind is everything. What you think you become.", kor: "마음이 전부다. 생각하는 대로 투영되어 네가 된다.", author: "Buddha" },
            { eng: "An investment in knowledge pays the best interest.", kor: "지식에 대한 투자가 가장 높은 이자를 안겨준다.", author: "Benjamin Franklin" },
            { eng: "Genius is 1% inspiration and 99% perspiration.", kor: "천재는 1%의 영감과 99%의 땀방울로 만들어진다.", author: "Thomas Edison" },
            { eng: "Fall seven times, stand up eight.", kor: "일곱 번 넘어지면 여덟 번 일어나라.", author: "Japanese Proverb" },
            { eng: "Action is the foundational key to all success.", kor: "실천과 행동은 모든 성공의 가장 기초적인 열쇠이다.", author: "Pablo Picasso" },
            { eng: "The way to get started is to quit talking and begin doing.", kor: "시작하는 법은 말하기를 멈추고 행동으로 옮기는 것이다.", author: "Walt Disney" },
            { eng: "Great things are done by a series of small things brought together.", kor: "위대한 일은 작은 일들이 연속적으로 모여서 이루어진다.", author: "Vincent van Gogh" },
            { eng: "There is no substitute for hard work.", kor: "노력을 대신할 수 있는 것은 세상에 아무것도 없다.", author: "Thomas Edison" },
            { eng: "The expert in anything was once a beginner.", kor: "어떤 분야의 전문가든 처음에는 모두 초보자였다.", author: "Helen Hayes" },
            { eng: "Concentrate all your thoughts upon the work at hand.", kor: "지금 당장 네 손에 쥔 일에 네 모든 정신을 집중하라.", author: "Alexander Graham Bell" },
            { eng: "If you are working on something that you really care about, you don't have to be pushed.", kor: "정말 소중히 여기는 일을 하고 있다면, 누구도 널 등 떠밀 필요가 없다.", author: "Steve Jobs" },
            { eng: "Perseverance is not a long race; it is many short races one after the other.", kor: "인내는 긴 경주가 아니라, 수많은 짧은 경주들이 이어지는 과정이다.", author: "Walter Elliot" },
            { eng: "Preparation for tomorrow is doing your best today.", kor: "내일을 위한 가장 좋은 준비는 오늘 최선을 다하는 것이다.", author: "H. Jackson Brown Jr." },
            { eng: "You don't have to be great to start, but you have to start to be great.", kor: "시작하기 위해 위대해질 필요는 없지만, 위대해지려면 반드시 시작해야 한다.", author: "Zig Ziglar" },
            { eng: "A year from now you may wish you had started today.", kor: "지금으로부터 1년 뒤, 너는 오늘 시작했기를 뼈저리게 바랄지도 모른다.", author: "Karen Lamb" },
            { eng: "Small daily improvements over time lead to stunning results.", kor: "시간이 흐르며 쌓인 매일의 작은 발전은 놀라운 결과를 낳는다.", author: "Robin Sharma" },
            { eng: "Don't be afraid to give up the good to go for the great.", kor: "더 위대한 것을 위해 지금의 좋은 것을 포기하는 걸 두려워 마라.", author: "John D. Rockefeller" },
            { eng: "The hardship of today is the strength of tomorrow.", kor: "오늘 마주한 고단함은 내일의 단단한 힘이 된다.", author: "Unknown" },
            { eng: "Be not afraid of growing slowly, be afraid only of standing still.", kor: "느리게 성장하는 것을 두려워하지 말고, 오직 멈춰 서 있는 것을 두려워하라.", author: "Chinese Proverb" },
            { eng: "Learning never exhausts the mind.", kor: "배움은 결코 우리의 영혼과 정신을 지치게 하지 않는다.", author: "Leonardo da Vinci" },
            { eng: "Your talent determines what you can do. Your motivation determines how much you are willing to do.", kor: "재능은 무엇을 할지 결정하고, 동기는 그것을 얼마나 기꺼이 할지 결정한다.", author: "Lou Holtz" },
            { eng: "Quality is not an act, it is a habit.", kor: "탁월함은 일시적인 행동이 아니라, 매일 반복되는 습관이다.", author: "Aristotle" },
            { eng: "With the new day comes new strength and new thoughts.", kor: "새로운 날과 함께 새로운 힘과 새로운 지혜가 찾아온다.", author: "Eleanor Roosevelt" },
            { eng: "The successfully focused student is a master of their own time.", kor: "성공적으로 몰입하는 학생은 자기 시간의 온전한 주인이 된다.", author: "Unknown" },
            { eng: "If you want to live a happy life, tie it to a goal, not to people or things.", kor: "행복한 삶을 원한다면 사람이나 사물이 아닌 목표에 너를 묶어라.", author: "Albert Einstein" },
            { eng: "Energy and persistence conquer all things.", kor: "활기찬 에너지와 끈질긴 인내는 세상의 모든 것을 정복한다.", author: "Benjamin Franklin" },
            { eng: "Keep your eyes on the stars, and your feet on the ground.", kor: "눈은 저 높은 별을 바라보고, 발은 단단히 땅을 디뎌라.", author: "Theodore Roosevelt" },
            { eng: "Success is walking from failure to failure with no loss of enthusiasm.", kor: "성공이란 열정을 잃지 않고 실패에서 실패로 꿋꿋이 걸어가는 능력이다.", author: "Winston Churchill" },
            { eng: "You are never too old to set another goal or to dream a new dream.", kor: "새로운 목표를 세우거나 새로운 꿈을 꾸기에 너무 늦은 나이란 없다.", author: "C.S. Lewis" },
            { eng: "It is the courage to continue that counts.", kor: "결국 중요한 것은 멈추지 않고 계속해 나가는 용기다.", author: "Winston Churchill" },
            { eng: "Be so good they can't ignore you.", kor: "세상이 결코 너를 무시할 수 없을 만큼 압도적인 실력을 갖춰라.", author: "Steve Martin" },
            { eng: "Pain is temporary. Quitting lasts forever.", kor: "지금 느끼는 고통은 일시적이지만, 포기한 후회의 순간은 영원히 남는다.", author: "Lance Armstrong" },
            { eng: "The difference between ordinary and extraordinary is that little extra.", kor: "평범함과 특별함의 차이는 단 1%의 작은 추가적인 노력이다.", author: "Jimmy Johnson" }, // 💡 오타 수정 완료!
            { eng: "Dream big and dare to fail.", kor: "꿈을 원대하게 꾸고, 기꺼이 실패에 당당히 맞서라.", author: "Norman Vaughan" },
            { eng: "What we achieve inwardly will change outer reality.", kor: "우리가 내면에서 성취해 낸 것이 결국 외부의 현실을 바꾼다.", author: "Plutarch" },
            { eng: "The fully focused mind can pierce through any difficulty.", kor: "온전히 몰입한 정신은 그 어떤 거대한 장벽도 뚫고 나갈 수 있다.", author: "Unknown" },
            { eng: "To live is to change, and to be perfect is to have changed often.", kor: "산다는 것은 변화하는 것이며, 완벽해진다는 것은 자주 치열하게 변해왔다는 뜻이다.", author: "John Henry Newman" },
            { eng: "Never let the fear of striking out keep you from playing the game.", kor: "삼진 아웃을 당할지 모른다는 두려움 때문에 경기를 포기하지 마라.", author: "Babe Ruth" },
            { eng: "Hard work beats talent when talent fails to work hard.", kor: "천재적인 재능이 노력하지 않을 때, 끈질긴 노력이 그 재능을 이긴다.", author: "Tim Notke" },
            { eng: "Only those who dare to fail greatly can ever achieve greatly.", kor: "크게 실패할 용기가 있는 자만이 비로소 크게 성취할 수 있다.", author: "Robert F. Kennedy" },
            { eng: "If you can dream it, you can do it.", kor: "꿈꿀 수 있는 능력만 있다면, 너는 그것을 반드시 실현할 수 있다.", author: "Walt Disney" },
            { eng: "Everything you've ever wanted is on the other side of fear.", kor: "네가 평생 원해왔던 모든 것은 두려움이라는 장벽의 바로 맞은편에 있다.", author: "George Addair" },
            { eng: "Your determination is the key to unlocking the door to the college of your dreams.", kor: "너의 단단한 결단력이 꿈꾸던 대학의 문을 여는 마스터키가 될 거야.", author: "Unknown" },
            { eng: "The only place where success comes before work is in the dictionary.", kor: "노력보다 성공이 먼저 나오는 유일한 장소는 오직 사전뿐이다.", author: "Vidal Sassoon" },
            { eng: "You can see your goal approaching with every single page you turn.", kor: "책장을 한 장씩 넘길 때마다, 목표가 네게 다가오는 것을 느끼게 될 것이다.", author: "Unknown" }, // 💡 자잘한 영어 구문 수정 완료!
            { eng: "Little by little, one travels far.", kor: "조금씩, 그리고 한 걸음씩 나아가다 보면 결국 아주 먼 곳까지 가닿는다.", author: "J.R.R. Tolkien" },
            { eng: "The quiet desk in the late evening is the birthing place of your bright future.", kor: "늦은 저녁의 고요한 책상은 너의 찬란한 미래가 탄생하는 고귀한 요람이다.", author: "Unknown" },
            { eng: "Believe in yourself and all that you are.", kor: "너 자신을 믿어라. 그리고 네 안에 깃든 위대한 잠재력을 신뢰하라.", author: "Christian D. Larson" },
            { eng: "There is something inside you that is greater than any obstacle.", kor: "네 안에는 그 어떤 거대한 장애물보다 훨씬 더 강력한 무언가가 존재한다.", author: "Christian D. Larson" },
            { eng: "Don't let what you cannot do interfere with what you can do.", kor: "할 수 없는 일이 네가 당장 할 수 있는 일을 가로막도록 방치하지 마라.", author: "John Wooden" },
            { eng: "The roots of education are bitter, but the fruit is sweet.", kor: "배움의 뿌리는 아주 쓰고 고되지만, 그 열매는 한없이 달콤하다.", author: "Aristotle" },
            { eng: "No pressure, no diamonds.", kor: "압도적인 압력이 없다면, 찬란하게 빛나는 다이아몬드도 존재할 수 없다.", author: "Mary Case" },
            { eng: "The best time to plant a tree was 20 years ago. The second best time is now.", kor: "나무를 심기 가장 좋았던 때는 20년 전이었다. 그다음으로 가장 좋은 때는 바로 지금이다.", author: "Chinese Proverb" },
            { eng: "Our destiny is changed by our daily routines.", kor: "우리의 거대한 운명은 매일 반복하는 작은 루틴에 의해 서서히 바뀐다.", author: "Unknown" },
            { eng: "The dark night will fade away, and your shining day will come soon.", kor: "이 어두운 밤도 결국 스러지고, 너의 눈부신 날이 곧 약속처럼 찾아올 거야.", author: "Unknown" },
            { eng: "Work hard in silence, let your success be your noise.", kor: "침묵 속에서 묵묵히 노력하라. 그리고 네 성공의 결과가 세상에 외치게 하라.", author: "Frank Ocean" },
            { eng: "The harder you work for something, the greater you'll feel when you achieve it.", kor: "무언가를 위해 더 치열하게 고생할수록, 성취했을 때의 기쁨은 몇 배로 거대해진다.", author: "Unknown" },
            { eng: "Do something today that your future self will thank you for.", kor: "미래의 네가 돌아보고 고마워할 만한 일을 오늘 당장 실천하라.", author: "Unknown" },
            { eng: "The difference between who you are and who you want to be is what you do.", kor: "현재의 나와 내가 되고 싶은 나 사이의 유일한 격차는 바로 실천이다.", author: "Unknown" },
            { eng: "It's not that I'm so smart, it's just that I stay with problems longer.", kor: "내가 유달리 똑똑한 게 아니다. 그저 남들보다 문제를 더 오래 붙잡고 고민할 뿐이다.", author: "Albert Einstein" },
            { eng: "Focus on being productive instead of busy.", kor: "그저 바쁘게 움직이는 것에 안주하지 말고, 영혼 있는 생산성을 내는 데 집중하라.", author: "Tim Ferriss" },
            { eng: "You can do anything, but not everything. Focus is key.", kor: "너는 무엇이든 할 수 있지만, 모든 것을 동시에 할 순 없다. 선택과 집중이 핵심이다.", author: "David Allen" },
            { eng: "What you do today can improve all your tomorrows.", kor: "오늘 네가 묵묵히 행하는 일들이 너의 모든 내일을 송두리째 바꿀 수 있다.", author: "Ralph Marston" },
            { eng: "The only bad exam is the one you didn't learn from.", kor: "유일하게 나쁜 시험은 그 패배로부터 아무것도 배우지 못한 시험뿐이다.", author: "Unknown" },
            { eng: "You don't need to see the whole staircase, just take the first step.", kor: "계단 전체를 멀리서 미리 다 볼 필요는 없다. 그저 눈앞의 첫걸음을 딛어라.", author: "Martin Luther King Jr." },
            { eng: "A challenge is an opportunity to prove your strength.", kor: "눈앞의 시련과 도전은 너의 단단한 강인함을 증명할 가장 완벽한 기회다.", author: "Unknown" },
            { eng: "Consistency is what transforms average into excellence.", kor: "한결같은 꾸준함이야말로 평범함을 비범함으로 바꾸는 기적의 힘이다.", author: "Unknown" },
            { eng: "Your concentration in this quiet room is building your kingdom.", kor: "이 정적 가득한 야자실에서의 깊은 몰입이 너만의 거대한 왕국을 세우는 중이다.", author: "Unknown" },
            { eng: "The golden gate of opportunity opens to those who endure the silence.", kor: "기회의 찬란한 황금 문은 이 고독한 침묵을 견뎌내는 자에게만 열린다.", author: "Unknown" },
            { eng: "A focused student can change the world starting from their desk.", kor: "몰입할 줄 아는 학생은 자신의 작은 책상에서부터 온 세상을 바꾸기 시작한다.", author: "Unknown" },
            { eng: "Continuous effort is the key to unlocking our potential.", kor: "끊임없이 쏟아붓는 노력이야말로 내면의 잠재력을 깨우는 유일한 열쇠다.", author: "Winston Churchill" },
            { eng: "Never give up on a dream just because of the time it will take to accomplish it.", kor: "그 꿈을 이루는 데 오랜 시간이 걸릴 것 같다는 이유로 꿈을 절대 포기하지 마라.", author: "Earl Nightingale" },
            { eng: "The individual who says it cannot be done should not interrupt the one doing it.", kor: "안 된다고 불평하는 사람은, 지금 이 순간 묵묵히 해내고 있는 사람을 방해해선 안 된다.", author: "Chinese Proverb" },
            { eng: "Your future is created by what you do today, not tomorrow.", kor: "너의 아름다운 미래는 오늘 네가 행하는 일들로 창조되지, 내일이 아니다.", author: "Robert Kiyosaki" },
            { eng: "The energy of passion will lead you to the path of victory.", kor: "가슴속 뜨거운 열정의 에너지는 너를 결국 승리의 탄탄대로로 인도할 것이다.", author: "Unknown" },
            { eng: "If you push through the dark Tunnel, the bright light awaits you.", kor: "이 어두운 터널을 끝까지 뚫고 나아간다면, 눈부신 빛이 널 기다릴 것이다.", author: "Unknown" },
            { eng: "The beautiful dreams you hold in your heart will soon become your reality.", kor: "네가 가슴 깊은 곳에 고이 간직한 아름다운 꿈들은 머지않아 현실이 될 것이다.", author: "Unknown" },
            { eng: "Every step forward, no matter how small, brings you closer to your dream college.", kor: "아무리 작아 보일지라도 앞으로 내딛는 모든 걸음은 꿈꾸던 대학에 한 걸음 더 다가서게 한다.", author: "Unknown" },
            { eng: "Your persistence is the wings that will help you fly high into the sky.", kor: "포기하지 않는 끈기야말로 저 높은 드넓은 하늘로 비상하게 해 줄 날개다.", author: "Unknown" },
            { eng: "The passion within you is more powerful than any difficulty you face.", kor: "네 내면에 살아 숨 쉬는 열정은 네가 마주할 그 어떤 역경보다 훨씬 강력하다.", author: "Unknown" },
            { eng: "Every great dream begins with a dreamer.", kor: "세상의 모든 위대한 꿈은 언제나 간절히 꿈꾸는 한 사람으로부터 시작된다.", author: "Harriet Tubman" },
            { eng: "You are the author of your own destiny. Write a masterpiece.", kor: "너는 네 운명을 직접 써 내려가는 위대한 작가다. 최고작을 완성하라.", author: "Unknown" }
        ];

        let currentEngText = ""; // 현재 화면에 표시된 영어 문장을 저장할 변수

        // 페이지가 열릴 때 랜덤 명언 세팅
        window.addEventListener('DOMContentLoaded', () => {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            const selectedQuote = quotes[randomIndex];

            currentEngText = selectedQuote.eng; // 발음용 변수에 저장
            document.getElementById('quote-eng').innerText = `"${selectedQuote.eng}"`;
            document.getElementById('quote-kor').innerText = `"${selectedQuote.kor}"`;
            document.getElementById('quote-author').innerText = `- ${selectedQuote.author} -`;
        });

        // 🔊 영어 발음 듣기 버튼 동작
        document.getElementById('btn-speak').addEventListener('click', (e) => {
            e.stopPropagation(); // 이 버튼을 누를 때 메인 화면으로 넘어가지 않도록 방지

            // 혹시 이미 말하고 있다면 취소
            window.speechSynthesis.cancel();

            // 읽을 텍스트 객체 생성
            const speech = new SpeechSynthesisUtterance(currentEngText);
            speech.lang = 'en-US'; // 영어 발음 설정
            speech.rate = 0.9;     // 말하기 속도 (약간 느리게)
            speech.pitch = 1.0;    // 음높이

            // 스마트폰 음성 서비스로 재생
            window.speechSynthesis.speak(speech);
        });

        // '터치해서 시작하기' 버튼 누르면 메인 화면으로 이동
        const quoteScreen = document.getElementById('quote-screen');
        const mainContent = document.getElementById('main-content');

        document.getElementById('btn-next').addEventListener('click', () => {
            // 목소리가 나오고 있었다면 종료
            window.speechSynthesis.cancel();

            quoteScreen.style.opacity = '0';
            setTimeout(() => {
                quoteScreen.style.display = 'none';
                mainContent.classList.remove('hidden');
            }, 500);
        });

        // 🖥️ 기존 전체화면 설정
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`전체화면 전환 오류: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
        document.addEventListener('dblclick', toggleFullScreen);
        let lastTap = 0;
        document.addEventListener('touchend', function (event) {
            let currentTime = new Date().getTime();
            let tapLength = currentTime - lastTap;
            if (tapLength < 500 && tapLength > 0) {
                toggleFullScreen();
                event.preventDefault();
            }
            lastTap = currentTime;
        });
    </script>
</body>

</html>
