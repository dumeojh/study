<!DOCTYPE html>
<html lang="ko">

<head>
    <!--[cite: 2] 문서의 기본 문자셋과 모바일 화면 크기 자동 맞춤 설정입니다. -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안성여고 야자 통합 관리</title>

    <!-- 📱 모바일 앱(PWA) 설정을 위한 태그들 시작 -->
    <!-- 연결할 매니페스트 파일 지정 -->
    <link rel="manifest" href="manifest.json">
    <!-- 모바일 브라우저 상단 상태바 색상을 보라색으로 지정 -->
    <meta name="theme-color" content="#7e22ce">

    <!-- 아이폰(iOS) 사용자를 위한 웹앱 설정 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="야자관리">
    <link rel="apple-touch-icon" href="icon-192.png">
    <!-- 📱 모바일 앱(PWA) 설정 끝 -->

    <!--[cite: 2] 디자인을 쉽게 입히기 위해 Tailwind CSS를 불러옵니다. -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!--[cite: 2] 메뉴 카드에 마우스를 올렸을 때의 애니메이션 효과 설정입니다. -->
    <style>
        .menu-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<!--[cite: 2] 화면 전체를 회색 배경으로 채우고 내용을 가운데 정렬하는 body 태그입니다. -->

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

    <!--[cite: 2] 내용을 담는 메인 박스 (최대 너비를 제한하여 모바일에서 보기 좋게 만듭니다.) -->
    <div class="max-w-md w-full space-y-6">

        <!--[cite: 2] 상단 제목 영역 -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-purple-700"><span aria-hidden="true">🏫</span> 안성여고 야자 시스템</h1>
            <p class="text-gray-500 mt-2">원하시는 서비스를 선택하세요.</p>
        </div>

        <!--[cite: 2] 1. 출석 및 랭킹 확인 버튼 (my-yaja.html로 이동) -->
        <a href="my-yaja.html" class="block">
            <div
                class="menu-card bg-white p-6 rounded-2xl border-l-8 border-purple-500 shadow-sm flex items-center justify-between">
                <div>
                    <h2 class="text-lg font-bold text-gray-800"><span aria-hidden="true">📊</span> 나의 참여 정보</h2>
                    <p class="text-sm text-gray-500">출석 횟수 및 고정석 순위 확인</p>
                </div>
                <span class="text-3xl" aria-hidden="true">🏆</span>
            </div>
        </a>

        <!--[cite: 2] 2. 자율석 일일 발권 버튼 (daily_ticket.html로 이동) -->
        <a href="daily_ticket.html" class="block">
            <div
                class="menu-card bg-white p-6 rounded-2xl border-l-8 border-green-500 shadow-sm flex items-center justify-between">
                <div>
                    <h2 class="text-lg font-bold text-gray-800"><span aria-hidden="true">🎫</span> 자율석 일일 발권</h2>
                    <p class="text-sm text-gray-500">오늘 앉을 자율석 자리 선택</p>
                </div>
                <span class="text-3xl" aria-hidden="true">📍</span>
            </div>
        </a>

        <!--[cite: 2] 3. 신청 정보 수정 버튼 (sign_up.html로 이동) -->
        <a href="sign_up.html" class="block">
            <div
                class="menu-card bg-white p-6 rounded-2xl border-l-8 border-blue-500 shadow-sm flex items-center justify-between">
                <div>
                    <h2 class="text-lg font-bold text-gray-800"><span aria-hidden="true">✍️</span> 야간 자율학습 신청</h2>
                    <p class="text-sm text-gray-500">월간 신청 종류 및 요일 변경</p>
                </div>
                <span class="text-3xl" aria-hidden="true">⚙️</span>
            </div>
        </a>

        <!--[cite: 2] 하단 저작권 표시 영역 -->
        <div class="text-center pt-4">
            <p class="text-xs text-gray-400">© 2026 안성여자고등학교 야간 자율학습 관리</p>
        </div>
    </div>

    <!-- 🖥️ 모바일 기기 편의 기능: 더블 클릭(더블 탭) 시 전체화면 전환 자바스크립트 -->
    <script>
        // 화면을 두 번 터치(클릭)했을 때 동작하는 함수입니다.
        function toggleFullScreen() {
            // 현재 전체화면이 아니라면 전체화면으로 만듭니다.
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`전체화면 전환 오류: ${err.message}`);
                });
            } else {
                // 이미 전체화면이라면 원래 화면으로 되돌립니다.
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // 컴퓨터 마우스 더블 클릭 이벤트 감지
        document.addEventListener('dblclick', toggleFullScreen);

        // 모바일 기기(핸드폰, 태블릿) 손가락 더블 탭 이벤트 감지
        let lastTap = 0;
        document.addEventListener('touchend', function (event) {
            let currentTime = new Date().getTime();
            let tapLength = currentTime - lastTap;
            // 터치 간격이 0.5초(500ms) 이하이면 더블 탭으로 인식합니다.
            if (tapLength < 500 && tapLength > 0) {
                toggleFullScreen();
                event.preventDefault(); // 기본 터치 동작 방지
            }
            lastTap = currentTime;
        });
    </script>
</body>

</html>
