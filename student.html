<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안성여고 야자 통합 관리</title>

    <!-- 📱 모바일 앱(PWA) 설정 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7e22ce">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="야자관리">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .menu-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6 select-none">

    <!-- 🌟 1. 처음 들어왔을 때 보여줄 명언 화면 (영어 발음 기능 추가) -->
    <div id="quote-screen" class="fixed inset-0 bg-purple-900 text-white flex flex-col items-center justify-center p-8 z-50 transition-opacity duration-500">
        <!-- 터치 구역 분리를 위해 내부에 컨테이너 배치 -->
        <div class="text-center max-w-sm space-y-6">
            <div class="text-5xl">🌙</div>
            
            <!-- 영어 명언 (여기를 읽게 됩니다) -->
            <h2 id="quote-eng" class="text-xl md:text-2xl font-bold leading-relaxed">
                "The secret of getting ahead is getting started."
            </h2>
            
            <!-- 한국어 번역 -->
            <p id="quote-kor" class="text-purple-200 text-base break-keep">
                "앞서가는 방법의 비밀은 시작하는 것이다."
            </p>
            
            <p id="quote-author" class="text-purple-300 text-xs">- Mark Twain -</p>
            
            <!-- 🔊 영어 듣기 버튼 (이 버튼을 누르면 영어 발음이 나옵니다) -->
            <button id="btn-speak" class="mx-auto mt-4 flex items-center gap-2 bg-purple-700 hover:bg-purple-600 active:scale-95 text-white font-medium py-2 px-5 rounded-full shadow-md transition-all text-sm">
                <span>🔊</span> 영어 발음 듣기
            </button>
            
            <!-- 다음으로 진행하기 버튼 -->
            <button id="btn-next" class="w-full mt-8 bg-white text-purple-950 font-bold py-3 px-6 rounded-xl shadow-lg active:scale-98 transition-all">
                터치해서 시작하기 →
            </button>
        </div>
    </div>


    <!-- 🏫 2. 내용을 담는 메인 박스 (처음에는 숨겨둠) -->
    <div id="main-content" class="max-w-md w-full space-y-6 hidden">

        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-purple-700"><span aria-hidden="true">🏫</span> 안성여고 야자 시스템</h1>
            <p class="text-gray-500 mt-2">원하시는 서비스를 선택하세요.</p>
        </div>

        <a href="my-yaja.html" class="block">
            <div class="menu-card bg-white p-6 rounded-2xl border-l-8 border-purple-500 shadow-sm flex items-center justify-between">
                <div>
                    <h2 class="text-lg font-bold text-gray-800"><span aria-hidden="true">📊</span> 나의 참여 정보</h2>
                    <p class="text-sm text-gray-500">출석 횟수 및 고정석 순위 확인</p>
                </div>
                <span class="text-3xl" aria-hidden="true">🏆</span>
            </div>
        </a>

        <a href="daily_ticket.html" class="block">
            <div class="menu-card bg-white p-6 rounded-2xl border-l-8 border-green-500 shadow-sm flex items-center justify-between">
                <div>
                    <h2 class="text-lg font-bold text-gray-800"><span aria-hidden="true">🎫</span> 자율석 일일 발권</h2>
                    <p class="text-sm text-gray-500">오늘 앉을 자율석 자리 선택</p>
                </div>
                <span class="text-3xl" aria-hidden="true">📍</span>
            </div>
        </a>

        <a href="sign_up.html" class="block">
            <div class="menu-card bg-white p-6 rounded-2xl border-l-8 border-blue-500 shadow-sm flex items-center justify-between">
                <div>
                    <h2 class="text-lg font-bold text-gray-800"><span aria-hidden="true">✍️</span> 야간 자율학습 신청</h2>
                    <p class="text-sm text-gray-500">월간 신청 종류 및 요일 변경</p>
                </div>
                <span class="text-3xl" aria-hidden="true">⚙️</span>
            </div>
        </a>

        <div class="text-center pt-4">
            <p class="text-xs text-gray-400">© 2026 안성여자고등학교 야간 자율학습 관리</p>
        </div>
    </div>

    <!-- 스크립트 영역 -->
    <script>
        // 📚 영어 명언 데이터베이스 (원하는 대로 마음껏 추가 가능!)
        const quotes = [
            { eng: "The secret of getting ahead is getting started.", kor: "앞서가는 방법의 비밀은 시작하는 것이다.", author: "Mark Twain" },
            { eng: "Believe you can and you're halfway there.", kor: "할 수 있다고 믿어라. 이미 절반은 온 것이다.", author: "Theodore Roosevelt" },
            { eng: "Don't watch the clock; do what it does. Keep going.", kor: "시계를 보지 마라. 시계가 하는 대로 계속 나아가라.", author: "Sam Levenson" },
            { eng: "It always seems impossible until it's done.", kor: "끝나기 전까지는 언제나 불가능해 보인다.", author: "Nelson Mandela" },
            { eng: "The only way to do great work is to love what you do.", kor: "위대한 일을 하는 유일한 방법은 당신이 하는 일을 사랑하는 것이다.", author: "Steve Jobs" },
            { eng: "Success is the sum of small efforts, repeated day in and day out.", kor: "성공은 매일 반복되는 작은 노력들의 합산이다.", author: "Robert Collier" },
            { eng: "Our greatest weakness lies in giving up.", kor: "우리의 가장 큰 약점은 포기하는 것에 있다.", author: "Thomas Edison" },
            { eng: "The beautiful thing about learning is that no one can take it away from you.", kor: "배움의 아름다운 점은 아무도 그것을 당신에게서 빼앗을 수 없다는 것이다.", author: "B.B. King" },
            { eng: "Opportunities don't happen, you create them.", kor: "기회는 일어나는 것이 아니라, 당신이 만드는 것이다.", author: "Chris Grosser" },
            { eng: "There are no shortcuts to any place worth going.", kor: "갈 만한 가치가 있는 곳으로 가는 지름길은 없다.", author: "Beverly Sills" }
        ];

        let currentEngText = ""; // 현재 화면에 표시된 영어 문장을 저장할 변수

        // 페이지가 열릴 때 랜덤 명언 세팅
        window.addEventListener('DOMContentLoaded', () => {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            const selectedQuote = quotes[randomIndex];

            currentEngText = selectedQuote.eng; // 발음용 변수에 저장
            document.getElementById('quote-eng').innerText = `"${selectedQuote.eng}"`;
            document.getElementById('quote-kor').innerText = `"${selectedQuote.kor}"`;
            document.getElementById('quote-author').innerText = `- ${selectedQuote.author} -`;
        });

        // 🔊 영어 발음 듣기 버튼 동작
        document.getElementById('btn-speak').addEventListener('click', (e) => {
            e.stopPropagation(); // 이 버튼을 누를 때 메인 화면으로 넘어가지 않도록 방지
            
            // 혹시 이미 말하고 있다면 취소
            window.speechSynthesis.cancel();

            // 읽을 텍스트 객체 생성
            const speech = new SpeechSynthesisUtterance(currentEngText);
            speech.lang = 'en-US'; // 영어 발음 설정 ('en-GB'로 하면 영국식 발음도 가능합니다)
            speech.rate = 0.9;     // 말하기 속도 (0.1 ~ 10, 약간 느리게 학생들 듣기 좋게 설정)
            speech.pitch = 1.0;    // 음높이

            // 스마트폰 음성 서비스로 재생
            window.speechSynthesis.speak(speech);
        });

        // '터치해서 시작하기' 버튼 누르면 메인 화면으로 이동
        const quoteScreen = document.getElementById('quote-screen');
        const mainContent = document.getElementById('main-content');

        document.getElementById('btn-next').addEventListener('click', () => {
            // 목소리가 나오고 있었다면 종료
            window.speechSynthesis.cancel();

            quoteScreen.style.opacity = '0';
            setTimeout(() => {
                quoteScreen.style.display = 'none';
                mainContent.classList.remove('hidden');
            }, 500); 
        });

        // 🖥️ 기존 전체화면 설정
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`전체화면 전환 오류: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
        document.addEventListener('dblclick', toggleFullScreen);
        let lastTap = 0;
        document.addEventListener('touchend', function (event) {
            let currentTime = new Date().getTime();
            let tapLength = currentTime - lastTap;
            if (tapLength < 500 && tapLength > 0) {
                toggleFullScreen();
                event.preventDefault();
            }
            lastTap = currentTime;
        });
    </script>
</body>

</html>
