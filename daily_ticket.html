<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>안성여고 자율석 일일 발권기</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary: #198754; --bg: #f4f7f6; --card: #ffffff; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .kiosk-container { width: 100%; max-width: 600px; background: var(--card); padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { margin: 0 0 10px 0; color: #1a1a1a; font-size: 24px; }
        .date-badge { display: inline-block; background: #e8f5e9; color: var(--primary); padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 16px; border: 1px solid #c3e6cb; }

        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 18px; text-align: center; transition: 0.3s; }
        .input-group input:focus { border-color: var(--primary); outline: none; }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; }
        .btn-main { background: var(--primary); box-shadow: 0 4px 10px rgba(25, 135, 84, 0.3); }
        .btn-main:active { transform: scale(0.98); }
        .btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

        #ticket-section { display: none; margin-top: 20px; border-top: 2px dashed #ddd; padding-top: 20px; }
        .student-info-box { background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; border: 1px solid #e9ecef; }
        .student-info-box strong { color: var(--primary); font-size: 18px; }

        /* 좌석 배치도 CSS */
        .seat-scroll-container { overflow-x: auto; padding: 10px 0; margin-bottom: 20px; }
        .seat-grid { display: grid; gap: 4px; justify-content: start; }
        .seat-cell { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; border-radius: 6px; box-sizing: border-box; text-align: center; line-height: 1.1; border: 1px solid #ccc; position: relative; }
        
        .seat-empty { background: transparent; border: none; } 
        .seat-static { opacity: 0.6; background: #e9ecef; color: #adb5bd; } /* 벽, 문, 고정석은 회색 처리 */
        
        /* 자율석 상태 */
        .seat-available { background: white; color: var(--primary); border: 2px solid var(--primary); cursor: pointer; }
        .seat-available:hover { background: #e8f5e9; transform: scale(1.1); z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .seat-taken { background: #f8d7da; color: #dc3545; border-color: #f5c2c7; opacity: 0.8; text-decoration: line-through; }
        .seat-selected { background: var(--primary) !important; color: white !important; border-color: #146c43; transform: scale(1.1); z-index: 10; box-shadow: 0 4px 10px rgba(25, 135, 84, 0.4); }

        /* 이미 발권된 내 티켓 화면 */
        .my-ticket { background: linear-gradient(135deg, #198754, #20c997); color: white; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 10px 20px rgba(32, 201, 151, 0.3); }
        .my-ticket h1 { margin: 0; font-size: 40px; margin-bottom: 10px; }
        .my-ticket p { margin: 5px 0; font-size: 18px; opacity: 0.9; }
    </style>
</head>
<body>

<div class="kiosk-container">
    <div class="header">
        <h2>🏫 일일 자율석 발권기</h2>
        <div class="date-badge" id="today-date-display">날짜 로딩 중...</div>
    </div>

<div id="login-section">
        <div id="main-notice" style="background:#fff3cd; color:#856404; padding:15px; border-radius:10px; margin-bottom:20px; border:1px solid #ffeeba; font-weight:bold; text-align:center; white-space:pre-wrap; line-height:1.4;">
            공지사항을 불러오는 중입니다...
        </div>
        
        <p style="text-align: center; color: #666; margin-bottom: 20px; font-size: 14px;">
            학번과 이름을 입력하고 오늘의 자리를 선택하세요.
        </p>
        <div class="input-group"><input type="number" id="stu-id" placeholder="학번 (예: 3101)"></div>
        <div class="input-group"><input type="text" id="stu-name" placeholder="이름 (실명)"></div>
        <button id="login-btn" class="btn btn-main" onclick="verifyForTicket()">조회하기</button>
    </div>



    

    <div id="ticket-section">
        <div class="student-info-box" id="student-info">
            </div>

        <div id="map-area">
            <p style="text-align: center; font-size: 14px; font-weight: bold; color: var(--primary);">초록색 테두리의 빈자리를 선택하세요.</p>
            <div style="text-align: center; font-size: 12px; color: #666; margin-bottom: 10px;">
                <span style="display:inline-block; width:12px; height:12px; border:2px solid var(--primary); background:white; vertical-align:middle;"></span> 선택가능 &nbsp;
                <span style="display:inline-block; width:12px; height:12px; background:var(--primary); vertical-align:middle;"></span> 내선택 &nbsp;
                <span style="display:inline-block; width:12px; height:12px; background:#f8d7da; vertical-align:middle;"></span> 다른학생 예약
            </div>
            
            <div class="seat-scroll-container">
                <div id="ticket-seat-grid" class="seat-grid"></div>
            </div>
            <button id="issue-btn" class="btn btn-main" onclick="issueTicket()" disabled>이 자리로 발권하기</button>
        </div>

        <div id="my-ticket-area" style="display: none;">
            <div class="my-ticket">
                <p>오늘의 내 자리</p>
                <h1 id="my-seat-name">A-5</h1>
                <p id="my-time-info">1타임, 2타임</p>
            </div>
            <p style="text-align: center; color: #666; font-size: 13px; margin-top: 15px;">※ 한 번 발권된 자리는 오늘 하루 동안 변경할 수 없습니다.</p>
            <button class="btn" style="background:#6c757d; margin-top:10px;" onclick="location.reload()">처음으로 돌아가기</button>
        </div>
    </div>
</div>

<script>

    let schoolSchedule = null; // 운영 시간 저장용
    
    // --- 파이어베이스 설정 ---
    const firebaseConfig = {
        apiKey: "AIzaSyBP6oveXbGlNn_0XqttHbU2ZDUYhH2nf4c",
        authDomain: "self-study-project-82bdf.firebaseapp.com",
        projectId: "self-study-project-82bdf",
        storageBucket: "self-study-project-82bdf.firebasestorage.app",
        messagingSenderId: "482006075036",
        appId: "1:482006075036:web:473445e0f86d48cd22cf59"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 전역 변수
    let serverRoster = {}; 
    let seatMapData = []; let layoutRows = 0; let layoutCols = 0;
    
    let todayObj = new Date();
    // 한국 시간 기준 날짜 문자열 생성 (YYYY-MM-DD)
    const todayStr = todayObj.toLocaleDateString('en-CA', { timeZone: 'Asia/Seoul' }); 
    const currentMonthStr = (todayObj.getMonth() + 1) + "월";
    const daysEng = ['sun','mon','tue','wed','thu','fri','sat'];
    const todayDayEng = daysEng[todayObj.getDay()];

    // 화면 상단 날짜 표시
    const daysKor = ['일','월','화','수','목','금','토'];
    document.getElementById('today-date-display').innerText = `${todayObj.getFullYear()}년 ${todayObj.getMonth()+1}월 ${todayObj.getDate()}일 (${daysKor[todayObj.getDay()]}요일)`;

    let studentSchedule = ""; // 오늘 하기로 한 타임 (예: "1,2")
    let selectedSeatId = "";
    let todayReservations = []; // 오늘 다른 학생들이 예약한 자율석 정보

// 1. 초기 데이터 로딩 (명단 + 도면 + 오늘의 예약 내역 + 공지사항)
    async function fetchInitialData() {
        const schedDoc = await db.collection("settings").doc("schedule").get();
        if (schedDoc.exists) {
            schoolSchedule = schedDoc.data();
            
            // 🌟 [새로 추가된 부분] 환경설정에서 가져온 공지사항을 화면에 뿌려줍니다.
            // 만약 선생님이 공지사항을 비워두셨다면 || 뒤에 있는 기본 문구가 출력됩니다.
            document.getElementById('main-notice').innerText = schoolSchedule.ticket_notice || "자율석 신청 학생만 이용할 수 있습니다.";
        }

        try {
            const rosterDoc = await db.collection("settings").doc("roster").get();
            if (rosterDoc.exists) serverRoster = JSON.parse(rosterDoc.data().list || "{}");
            
            const layoutDoc = await db.collection("settings").doc("seatLayout").get();
            if (layoutDoc.exists) {
                const data = layoutDoc.data();
                layoutRows = data.rows; layoutCols = data.cols;
                seatMapData = JSON.parse(data.grid).map(row => row.map(c => typeof c === 'number' ? {type: c, label: ""} : c));
            }

// [수정된 코드] 오늘 날짜 문서 단 1개만 읽어오기 (읽기 횟수 획기적 감소)
            const resDoc = await db.collection("daily_reservations_v2").doc(todayStr).get();
            if (resDoc.exists) {
                // Object.values를 통해 맵 형태의 데이터를 기존 코드와 호환되는 배열 형태로 변환
                todayReservations = Object.values(resDoc.data()); 
            } else {
                todayReservations = [];
            }

        } catch(e) { console.error("데이터 로드 에러:", e); }
    }
    fetchInitialData();



    
async function verifyForTicket() {
    // 1. 버튼 및 입력값 초기 선언 (Reference Error 방지)
    const btn = document.getElementById('login-btn');
    const id = document.getElementById('stu-id').value.trim();
    const name = document.getElementById('stu-name').value.trim();

    // 2. 기본 입력 유효성 검사
    if (!id || !name) {
        alert("학번과 이름을 모두 입력해주세요.");
        return;
    }

// 3. [운영 시간 제약 확인 - 환경설정 연동]
    if (schoolSchedule) {
        const now = new Date();
        // 현재 시간을 '분(minute)' 단위로 변환합니다. (예: 오후 4시 30분 -> 16*60 + 30 = 990분)
        const currentMin = now.getHours() * 60 + now.getMinutes();

        // 환경설정에서 저장한 1타임 시작 시간과 3타임 종료 시간을 가져옵니다.
        const [t1H, t1M] = schoolSchedule.t1.split(':').map(Number);
        const [endH, endM] = schoolSchedule.t3_end.split(':').map(Number); 
        
        // 🌟 [핵심 변경] 환경설정에서 설정한 '발권 시작 전 리드타임(분)'을 가져옵니다. (없으면 기본값 30)
        const leadTime = parseInt(schoolSchedule.ticket_lead_time || "30");
        
        // 1타임 시작 시간에서 리드타임(분)을 빼서 실제 '발권 시작 시간'을 계산합니다.
        const startMin = (t1H * 60 + t1M) - leadTime; 
        // 발권 마감 시간은 3타임 종료 시간과 동일합니다.
        const endMin = endH * 60 + endM;

        // 현재 시간이 발권 시작 시간보다 전이거나, 종료 시간보다 후라면 차단합니다.
        if (currentMin < startMin || currentMin > endMin) {
            // 학생에게 보여줄 알림창을 위해, 분 단위로 된 시간을 다시 "16:30" 형식의 문자로 바꿉니다.
            const startH = Math.floor(startMin / 60);
            const startM = startMin % 60;
            // padStart(2, '0')은 숫자가 한 자리일 때 앞에 '0'을 붙여줍니다. (예: 9분 -> 09분)
            const startTimeStr = `${String(startH).padStart(2,'0')}:${String(startM).padStart(2,'0')}`;
            
            // 학생 화면에 띄울 경고창입니다.
            alert(`지금은 발권 가능 시간이 아닙니다.\n오늘 발권 가능 시간: ${startTimeStr} ~ ${schoolSchedule.t3_end}`);
            return; // 여기서 함수를 종료하여 뒤의 명단 확인 단계로 넘어가지 못하게 막습니다.
        }
    }

    // 4. 명단 확인 및 상태 업데이트
    if (serverRoster[id] !== name) {
        alert("명단에 없거나 학번/이름이 일치하지 않습니다.");
        return;
    }

    btn.innerText = "확인 중..."; 
    btn.disabled = true;

    try {
        // 5. 이번 달 자율학습 신청 내역 확인
        const q = await db.collection("applications")
            .where("stuId", "==", id)
            .where("targetMonth", "==", currentMonthStr)
            .get();

        if (q.empty) {
            alert(`🚨 ${currentMonthStr} 자율학습 신청 내역이 없습니다.`);
            btn.innerText = "조회하기"; btn.disabled = false;
            return;
        }

        const data = q.docs[0].data();

        // 6. 신청 종류 확인 (고정석 학생은 발권 불필요)
        if (data.type !== "자율석") {
            alert("🚨 고정석 신청 학생입니다.\n고정석은 매일 발권할 필요 없이 지정된 자리로 바로 가면 됩니다.");
            btn.innerText = "조회하기"; btn.disabled = false;
            return;
        }

        // 7. 오늘(해당 요일) 자습 신청 여부 확인
        studentSchedule = data[todayDayEng]; // 예: data['mon'] -> "1,2"
        if (!studentSchedule) {
            alert("오늘은 자율학습을 신청한 요일이 아닙니다. 일정을 확인해주세요! 😊");
            btn.innerText = "조회하기"; btn.disabled = false;
            return;
        }

        // 8. 발권 자격 증명 완료 -> 화면 전환
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('ticket-section').style.display = 'block';
        
        document.getElementById('student-info').innerHTML = `
            <strong>${name} 학생, 환영합니다!</strong><br>
            <span style="font-size:14px; color:#666;">오늘 예정된 자습: [ ${studentSchedule} ] 타임</span>
        `;

        // 9. 오늘 이미 발권했는지 중복 예약 검사
        const myTicket = todayReservations.find(r => r.stuId === id);
        if (myTicket) {
            // 이미 발권한 내역이 있음 -> 티켓 화면 바로 표시
            document.getElementById('map-area').style.display = 'none';
            document.getElementById('my-ticket-area').style.display = 'block';
            document.getElementById('my-seat-name').innerText = myTicket.seatNum;
            document.getElementById('my-time-info').innerText = `${myTicket.times} 타임`;
        } else {
            // 아직 발권 전 -> 좌석 선택 도면 그리기
            buildTicketGrid();
        }

    } catch(e) {
        console.error("조회 오류:", e);
        alert("데이터를 조회하는 중 오류가 발생했습니다: " + e.message);
        btn.innerText = "조회하기";
        btn.disabled = false;
    }
}


    
    // 3. 자율석 전용 좌석표 그리기
    function buildTicketGrid() {
        const container = document.getElementById('ticket-seat-grid');
        container.style.gridTemplateColumns = `repeat(${layoutCols}, 45px)`;
        container.innerHTML = '';

        for (let r = 0; r < layoutRows; r++) {
            for (let c = 0; c < layoutCols; c++) {
                const cellData = seatMapData[r][c];
                const div = document.createElement('div');
                div.className = 'seat-cell';
                
                // 자율석(2)인 경우만 선택 가능하도록 로직 적용
                if (cellData.type === 2) {
                    const seatLabel = cellData.label || `자율-${r+1}-${c+1}`;
                    div.innerText = seatLabel;
                    
                    // 타임 겹침 검사 (내가 신청한 타임과, 이 자리를 이미 예약한 학생의 타임이 겹치는가?)
                    let isTaken = false;
                    const myTimes = studentSchedule.split(',');
                    
                    // 이 좌석에 대한 오늘의 모든 예약 내역 뒤지기
                    const seatReservations = todayReservations.filter(res => res.seatNum === seatLabel);
                    for (let res of seatReservations) {
                        const bookedTimes = res.times.split(',');
                        // 교집합이 하나라도 있으면 사용 불가 (겹침)
                        const overlap = myTimes.some(t => bookedTimes.includes(t));
                        if (overlap) { isTaken = true; break; }
                    }

                    if (isTaken) {
                        div.classList.add('seat-taken');
                    } else {
                        div.classList.add('seat-available');
                        div.onclick = () => pickTicketSeat(seatLabel, div);
                    }
                } else if (cellData.type === 0) {
                    div.classList.add('seat-empty'); // 통로
                } else {
                    // 고정석(1), 벽(3), 문(4), 특수(5)는 회색으로 비활성화 처리
                    div.classList.add('seat-static');
                    div.innerText = cellData.label || "";
                }
                container.appendChild(div);
            }
        }
    }

    function pickTicketSeat(label, cellElement) {
        document.querySelectorAll('.seat-cell').forEach(el => el.classList.remove('seat-selected'));
        cellElement.classList.add('seat-selected');
        selectedSeatId = label;
        document.getElementById('issue-btn').disabled = false;
        document.getElementById('issue-btn').innerText = `[ ${label} ] 자리로 발권하기`;
    }

    // 4. 발권 확정 (서버 전송)
    async function issueTicket() {
        const btn = document.getElementById('issue-btn');
        btn.innerText = "발권 처리 중..."; btn.disabled = true;

        const ticketData = {
            date: todayStr, // YYYY-MM-DD
            stuId: document.getElementById('stu-id').value.trim(),
            stuName: document.getElementById('stu-name').value.trim(),
            seatNum: selectedSeatId,
            times: studentSchedule, // 예: "1,2"
            timestamp: new Date()
        };

        try {
            // daily_reservations 컬렉션에 새 문서 추가
// [수정된 코드] 문서 추가(add) 대신, 오늘 날짜 문서 1개에 학번을 Key로 덮어쓰기(merge)
            const stuId = document.getElementById('stu-id').value.trim();
            await db.collection("daily_reservations_v2").doc(todayStr).set({
                [stuId]: ticketData 
            }, { merge: true });
            
            // 시각적 피드백을 위해 내 티켓 화면으로 바로 넘기기
            document.getElementById('map-area').style.display = 'none';
            document.getElementById('my-ticket-area').style.display = 'block';
            document.getElementById('my-seat-name').innerText = selectedSeatId;
            document.getElementById('my-time-info').innerText = `${studentSchedule} 타임`;
            
            alert("발권이 완료되었습니다. 열공하세요! 🔥");
        } catch(e) {
            alert("발권 오류: " + e.message);
            btn.innerText = `[ ${selectedSeatId} ] 자리로 발권하기`; btn.disabled = false;
        }
    }
</script>
</body>
</html>
